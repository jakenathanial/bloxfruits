<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RentAFruit — Leviathan Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot,
    updateDoc, arrayUnion, arrayRemove, deleteDoc, query, where, orderBy, serverTimestamp, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ============================================================
  //  🔥 PASTE YOUR FIREBASE CONFIG HERE
  // ============================================================
  const firebaseConfig = {
  apiKey: "AIzaSyDlBIeNVDK5nBPpVFkFSxNY59e7gW-p18c",
  authDomain: "rentafruit-f57d9.firebaseapp.com",
  projectId: "rentafruit-f57d9",
  storageBucket: "rentafruit-f57d9.firebasestorage.app",
  messagingSenderId: "66702277537",
  appId: "1:66702277537:web:e7f210f38252ad4fd0e9e0"
  measurementId: "G-0J9TNJNEV5"
};

  // ============================================================

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let currentRoom = null;
  let currentDestination = null;
  let roomsUnsub = null;
  let chatUnsub = null;

  // ── AUTH ──────────────────────────────────────────────────
  window.loginWithGoogle = async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e){ console.error(e); }
  };

  window.logOut = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, async user => {
    currentUser = user;
    if (user) {
      // Upsert user doc
      const uRef = doc(db, "users", user.uid);
      const snap = await getDoc(uRef);
      if (!snap.exists()) {
        await setDoc(uRef, { uid: user.uid, name: user.displayName, photo: user.photoURL, hasBeastBoat: false });
      }
      const userData = (await getDoc(uRef)).data();
      window._myBoat = userData.hasBeastBoat || false;
      renderApp("home");
    } else {
      renderApp("login");
    }
  });

  // ── PROFILE ───────────────────────────────────────────────
  window.toggleBeastBoat = async () => {
    const uRef = doc(db, "users", currentUser.uid);
    const snap = await getDoc(uRef);
    const cur = snap.data().hasBeastBoat || false;
    await updateDoc(uRef, { hasBeastBoat: !cur });
    window._myBoat = !cur;
    document.getElementById("boatToggle").checked = !cur;
    document.getElementById("boatStatus").textContent = !cur ? "Yes — Beast Hunter" : "No Beast Hunter";
    document.getElementById("boatStatus").style.color = !cur ? "var(--green)" : "var(--red)";
  };

  // ── NAVIGATION ────────────────────────────────────────────
  window.goHome = () => {
    cleanupListeners();
    currentRoom = null;
    currentDestination = null;
    renderApp("home");
  };

  window.goDestination = (dest) => {
    cleanupListeners();
    currentDestination = dest;
    renderApp("destination");
    loadRooms(dest);
  };

  function cleanupListeners() {
    if (roomsUnsub) { roomsUnsub(); roomsUnsub = null; }
    if (chatUnsub)  { chatUnsub();  chatUnsub  = null; }
  }

  // ── ROOMS ─────────────────────────────────────────────────
  window.createRoom = async () => {
    if (!currentUser || !currentDestination) return;
    const now = Date.now();
    const roomRef = await addDoc(collection(db, "rooms"), {
      destination: currentDestination,
      host: currentUser.displayName,
      hostUid: currentUser.uid,
      players: [{ uid: currentUser.uid, name: currentUser.displayName, hasBeastBoat: window._myBoat }],
      createdAt: now,
      expiresAt: now + 3600000
    });
    enterRoom(roomRef.id);
  };

  function loadRooms(dest) {
    const q = query(collection(db, "rooms"), where("destination", "==", dest));
    roomsUnsub = onSnapshot(q, snap => {
      const now = Date.now();
      const rooms = [];
      snap.forEach(d => {
        const r = { id: d.id, ...d.data() };
        if (r.expiresAt < now) { deleteDoc(doc(db, "rooms", d.id)); return; }
        rooms.push(r);
      });
      renderRoomList(rooms);
    });
  }

  function renderRoomList(rooms) {
    const el = document.getElementById("roomList");
    if (!el) return;
    if (rooms.length === 0) {
      el.innerHTML = `<div class="empty-msg">No active rooms. Be the first to create one!</div>`;
      return;
    }
    el.innerHTML = rooms.map(r => {
      const hasBeast = r.players.some(p => p.hasBeastBoat);
      const full = r.players.length >= 7;
      const remaining = Math.max(0, r.expiresAt - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      return `
      <div class="room-card" onclick="enterRoom('${r.id}')">
        <div class="room-header">
          <span class="room-host">👑 ${r.host}</span>
          <span class="timer-badge">⏱ ${mins}m ${secs}s</span>
        </div>
        <div class="room-info">
          <span class="player-count ${full ? 'full' : ''}">
            👥 ${r.players.length} / 7
          </span>
          <span class="beast-status ${hasBeast ? 'has-beast' : 'no-beast'}">
            ${hasBeast ? '🚢 Beast Hunter Available' : '❌ No Beast Hunter'}
          </span>
        </div>
        <button class="btn-join ${full ? 'disabled' : ''}" onclick="event.stopPropagation(); joinRoom('${r.id}')">
          ${full ? 'FULL' : 'JOIN ROOM'}
        </button>
      </div>`;
    }).join("");
  }

  window.joinRoom = async (roomId) => {
    const rRef = doc(db, "rooms", roomId);
    const snap = await getDoc(rRef);
    if (!snap.exists()) return;
    const r = snap.data();
    if (r.players.length >= 7) { alert("Room is full!"); return; }
    if (r.players.find(p => p.uid === currentUser.uid)) { enterRoom(roomId); return; }
    await updateDoc(rRef, {
      players: arrayUnion({ uid: currentUser.uid, name: currentUser.displayName, hasBeastBoat: window._myBoat })
    });
    enterRoom(roomId);
  };

  window.leaveRoom = async () => {
    if (!currentRoom) return;
    const rRef = doc(db, "rooms", currentRoom);
    const snap = await getDoc(rRef);
    if (!snap.exists()) { goDestination(currentDestination); return; }
    const r = snap.data();
    const me = r.players.find(p => p.uid === currentUser.uid);
    if (me) await updateDoc(rRef, { players: arrayRemove(me) });
    const updated = await getDoc(rRef);
    if (updated.exists() && updated.data().players.length === 0) {
      await deleteDoc(rRef);
    }
    cleanupListeners();
    currentRoom = null;
    renderApp("destination");
    loadRooms(currentDestination);
  };

  window.enterRoom = (roomId) => {
    cleanupListeners();
    currentRoom = roomId;
    renderApp("room");
    listenRoom(roomId);
    listenChat(roomId);
  };

  function listenRoom(roomId) {
    roomsUnsub = onSnapshot(doc(db, "rooms", roomId), snap => {
      if (!snap.exists()) { goDestination(currentDestination); return; }
      const r = { id: snap.id, ...snap.data() };
      if (r.expiresAt < Date.now()) { deleteDoc(doc(db, "rooms", roomId)); goDestination(currentDestination); return; }
      renderRoomView(r);
    });
  }

  function renderRoomView(r) {
    const hasBeast = r.players.some(p => p.hasBeastBoat);
    const remaining = Math.max(0, r.expiresAt - Date.now());
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);

    const el = document.getElementById("roomContent");
    if (!el) return;
    el.innerHTML = `
      <div class="room-meta">
        <div class="room-title-line">
          <h2 class="glow-text">${r.destination}</h2>
          <span class="room-timer-big">⏱ ${mins}:${String(secs).padStart(2,"0")}</span>
        </div>
        <div class="beast-banner ${hasBeast ? 'banner-green' : 'banner-red'}">
          ${hasBeast ? '🚢 BEAST HUNTER AVAILABLE' : '❌ NO BEAST HUNTER IN ROOM'}
        </div>
      </div>
      <div class="player-grid">
        ${r.players.map(p => `
          <div class="player-chip ${p.uid === currentUser?.uid ? 'me' : ''}">
            <span class="p-name">${p.name}</span>
            <span class="p-boat ${p.hasBeastBoat ? 'has-b' : 'no-b'}">${p.hasBeastBoat ? '🚢' : '🚫'}</span>
          </div>`).join("")}
        ${Array(Math.max(0, 7 - r.players.length)).fill(0).map(() =>
          `<div class="player-chip empty">Empty Slot</div>`).join("")}
      </div>`;
  }

  // ── CHAT ─────────────────────────────────────────────────
  function listenChat(roomId) {
    const q = query(collection(db, "rooms", roomId, "chat"), orderBy("ts", "asc"));
    chatUnsub = onSnapshot(q, snap => {
      const box = document.getElementById("chatBox");
      if (!box) return;
      box.innerHTML = snap.docs.map(d => {
        const m = d.data();
        const isMe = m.uid === currentUser?.uid;
        return `<div class="msg ${isMe ? 'msg-me' : 'msg-other'}">
          <span class="msg-name">${m.name}</span>
          <span class="msg-text">${escHtml(m.text)}</span>
        </div>`;
      }).join("");
      box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMessage = async () => {
    const input = document.getElementById("chatInput");
    const text = input?.value.trim();
    if (!text || !currentRoom) return;
    input.value = "";
    await addDoc(collection(db, "rooms", currentRoom, "chat"), {
      uid: currentUser.uid, name: currentUser.displayName, text, ts: serverTimestamp()
    });
  };

  window.chatKeyPress = (e) => { if (e.key === "Enter") window.sendMessage(); };

  function escHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── RENDERER ──────────────────────────────────────────────
  function renderApp(view) {
    const app = document.getElementById("app");
    if (view === "login") {
      app.innerHTML = `
        <div class="login-screen">
          <div class="login-bg"></div>
          <div class="login-card">
            <div class="logo-wrap">
              <div class="logo-icon">🍊</div>
              <h1 class="logo-title">RentAFruit</h1>
              <p class="logo-sub">LEVIATHAN HUNT MATCHMAKER</p>
            </div>
            <p class="login-desc">Join forces. Hunt the beast. Dominate the seas.</p>
            <button class="btn-google" onclick="loginWithGoogle()">
              <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.4l7.8 6C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.5-.1-3-.4-4.4H24v8.3h12.4c-.5 2.7-2.1 5-4.4 6.5l6.9 5.4c4-3.7 6.2-9.2 6.2-15.8z"/><path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.6l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-6.9-5.4c-2.1 1.4-4.8 2.3-8.3 2.3-6.3 0-11.7-3.7-13.5-9.1l-7.8 6C6.7 42.6 14.7 48 24 48z"/></svg>
              Sign in with Google
            </button>
          </div>
        </div>`;
      return;
    }

    // Shared header
    const header = `
      <header class="topbar">
        <div class="topbar-left" onclick="goHome()" style="cursor:pointer">
          <span class="topbar-logo">🍊 RentAFruit</span>
        </div>
        <div class="topbar-right">
          <img src="${currentUser?.photoURL}" class="avatar" alt="avatar" />
          <span class="username">${currentUser?.displayName}</span>
          <button class="btn-sm" onclick="logOut()">Logout</button>
        </div>
      </header>`;

    if (view === "home") {
      app.innerHTML = header + `
        <main class="main-content">
          <div class="profile-panel">
            <div class="profile-inner">
              <img src="${currentUser?.photoURL}" class="profile-avatar" />
              <div class="profile-info">
                <div class="profile-name">${currentUser?.displayName}</div>
                <div class="boat-toggle-row">
                  <label class="toggle-label">Beast Hunter Boat</label>
                  <label class="switch">
                    <input type="checkbox" id="boatToggle" ${window._myBoat ? "checked" : ""} onchange="toggleBeastBoat()" />
                    <span class="slider"></span>
                  </label>
                  <span id="boatStatus" style="color:${window._myBoat ? 'var(--green)' : 'var(--red)'}">
                    ${window._myBoat ? "Yes — Beast Hunter" : "No Beast Hunter"}
                  </span>
                </div>
              </div>
            </div>
          </div>

          <div class="hero-title">
            <div class="hero-sub">SELECT YOUR</div>
            <h1 class="hero-h1">Destination of<br/><span class="neon-purple">Leviathan Heart</span></h1>
          </div>

          <div class="dest-grid">
            <div class="dest-card" onclick="goDestination('Tiki Outpost')">
              <div class="dest-glow"></div>
              <div class="dest-icon">🏝️</div>
              <div class="dest-name">Tiki Outpost</div>
              <div class="dest-desc">Tropical hunting grounds</div>
              <div class="dest-arrow">→</div>
            </div>
            <div class="dest-card" onclick="goDestination('Hydra Island')">
              <div class="dest-glow dest-glow-blue"></div>
              <div class="dest-icon">🐉</div>
              <div class="dest-name">Hydra Island</div>
              <div class="dest-desc">Dragon-infested waters</div>
              <div class="dest-arrow">→</div>
            </div>
          </div>
        </main>`;
      return;
    }

    if (view === "destination") {
      app.innerHTML = header + `
        <main class="main-content">
          <div class="page-header">
            <button class="btn-back" onclick="goHome()">← Back</button>
            <h2 class="page-title">${currentDestination}</h2>
            <button class="btn-create" onclick="createRoom()">+ Create Room</button>
          </div>
          <div id="roomList" class="room-list">
            <div class="loading-rooms">Loading rooms...</div>
          </div>
        </main>`;
      return;
    }

    if (view === "room") {
      app.innerHTML = header + `
        <main class="main-content room-layout">
          <div class="room-left">
            <div class="room-top-bar">
              <button class="btn-back" onclick="leaveRoom()">← Leave</button>
            </div>
            <div id="roomContent" class="room-content"></div>
          </div>
          <div class="room-right">
            <div class="chat-header">💬 Room Chat</div>
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-input-row">
              <input id="chatInput" class="chat-input" placeholder="Type a message..." onkeypress="chatKeyPress(event)" />
              <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
          </div>
        </main>`;
      return;
    }
  }

  // Start timer refresh for destination page
  setInterval(() => {
    const roomCards = document.querySelectorAll(".timer-badge");
    if (roomCards.length) return; // handled by snapshot
    const roomTimer = document.getElementById("roomContent");
    if (!roomTimer || !currentRoom) return;
    // room timer auto-updates via snapshot
  }, 1000);
</script>

<style>
  :root {
    --bg: #050510;
    --bg2: #0a0a1a;
    --bg3: #0f0f22;
    --purple: #a855f7;
    --purple2: #7c3aed;
    --blue: #3b82f6;
    --blue2: #06b6d4;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --border: rgba(168,85,247,0.2);
    --border-blue: rgba(59,130,246,0.2);
    --glow-purple: 0 0 20px rgba(168,85,247,0.5);
    --glow-blue: 0 0 20px rgba(59,130,246,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; min-height: 100vh; }

  /* ── LOGIN ── */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .login-bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.15) 0%, transparent 60%);
    animation: pulse-bg 4s ease-in-out infinite;
  }

  @keyframes pulse-bg {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .login-card {
    background: rgba(10,10,26,0.95);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 50px 48px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    position: relative;
    box-shadow: var(--glow-purple), 0 40px 80px rgba(0,0,0,0.6);
    animation: card-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: none; }
  }

  .logo-icon { font-size: 64px; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(168,85,247,0.8)); }

  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }

  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 600;
  }

  .login-desc {
    margin: 20px 0 32px;
    color: var(--text-dim);
    font-size: 1rem;
    line-height: 1.6;
  }

  .btn-google {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    width: 100%;
    padding: 14px 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 1px;
  }

  .btn-google:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(5,5,16,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    background: linear-gradient(90deg, var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--purple);
    object-fit: cover;
  }

  .username {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text-dim);
    display: none;
  }

  @media (min-width: 480px) { .username { display: block; } }

  .btn-sm {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-sm:hover {
    border-color: var(--purple);
    color: var(--purple);
  }

  /* ── MAIN ── */
  .main-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* ── PROFILE PANEL ── */
  .profile-panel {
    background: rgba(168,85,247,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 36px;
  }

  .profile-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .profile-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid var(--purple);
    object-fit: cover;
    box-shadow: 0 0 16px rgba(168,85,247,0.4);
  }

  .profile-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--purple);
    letter-spacing: 1px;
  }

  .boat-toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .toggle-label {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 24px;
    transition: 0.3s;
  }

  .slider:before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; bottom: 3px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .slider { background: rgba(168,85,247,0.3); border-color: var(--purple); }
  input:checked + .slider:before { transform: translateX(20px); background: var(--purple); box-shadow: 0 0 8px var(--purple); }

  /* ── HERO ── */
  .hero-title { text-align: center; margin-bottom: 40px; }

  .hero-sub {
    font-size: 0.75rem;
    letter-spacing: 6px;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .hero-h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    line-height: 1.2;
    color: var(--text);
  }

  .neon-purple {
    background: linear-gradient(90deg, var(--purple), var(--blue2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(168,85,247,0.6));
  }

  /* ── DEST CARDS ── */
  .dest-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
  }

  .dest-card {
    position: relative;
    background: rgba(10,10,26,0.8);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 32px;
    text-align: center;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: card-in 0.5s ease both;
  }

  .dest-card:hover {
    border-color: var(--purple);
    transform: translateY(-6px);
    box-shadow: var(--glow-purple), 0 20px 40px rgba(0,0,0,0.4);
  }

  .dest-card:nth-child(2):hover {
    border-color: var(--blue);
    box-shadow: var(--glow-blue), 0 20px 40px rgba(0,0,0,0.4);
  }

  .dest-glow {
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(168,85,247,0.15), transparent 70%);
    pointer-events: none;
  }

  .dest-glow-blue {
    background: radial-gradient(circle, rgba(59,130,246,0.15), transparent 70%);
  }

  .dest-icon { font-size: 64px; margin-bottom: 16px; filter: drop-shadow(0 0 16px rgba(168,85,247,0.6)); }

  .dest-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .dest-desc { font-size: 0.85rem; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 20px; }

  .dest-arrow {
    font-size: 1.5rem;
    color: var(--purple);
    transition: transform 0.3s;
  }

  .dest-card:hover .dest-arrow { transform: translateX(8px); }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--purple);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(168,85,247,0.5);
  }

  .btn-back {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-back:hover { border-color: var(--purple); color: var(--purple); }

  .btn-create {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--purple2), var(--purple));
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s;
    box-shadow: 0 0 20px rgba(168,85,247,0.4);
  }

  .btn-create:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(168,85,247,0.6);
  }

  /* ── ROOM LIST ── */
  .room-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  .room-card {
    background: rgba(10,10,26,0.9);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s;
    animation: card-in 0.4s ease both;
  }

  .room-card:hover {
    border-color: var(--blue);
    transform: translateY(-3px);
    box-shadow: var(--glow-blue);
  }

  .room-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .room-host {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
  }

  .timer-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: var(--blue2);
    background: rgba(6,182,212,0.1);
    border: 1px solid rgba(6,182,212,0.3);
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 1px;
  }

  .room-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .player-count {
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .player-count.full { color: var(--red); }

  .beast-status {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .has-beast { color: var(--green); }
  .no-beast  { color: var(--red); }

  .btn-join {
    width: 100%;
    padding: 9px;
    background: linear-gradient(90deg, var(--blue2), var(--blue));
    border: none;
    border-radius: 7px;
    color: white;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
  }

  .btn-join:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-join.disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; color: var(--text-dim); }

  .empty-msg {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-dim);
    font-size: 1rem;
    padding: 60px 20px;
    border: 1px dashed var(--border);
    border-radius: 14px;
  }

  .loading-rooms {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
  }

  /* ── ROOM VIEW ── */
  .room-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 768px) {
    .room-layout { grid-template-columns: 1fr 380px; align-items: start; }
  }

  .room-top-bar { margin-bottom: 16px; }

  .room-meta { margin-bottom: 20px; }

  .room-title-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .glow-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--purple);
    text-shadow: 0 0 20px rgba(168,85,247,0.7);
    letter-spacing: 2px;
  }

  .room-timer-big {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    color: var(--blue2);
    background: rgba(6,182,212,0.1);
    border: 1px solid rgba(6,182,212,0.3);
    padding: 6px 14px;
    border-radius: 8px;
    letter-spacing: 2px;
  }

  .beast-banner {
    padding: 10px 16px;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
  }

  .banner-green {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.4);
    color: var(--green);
    text-shadow: 0 0 10px rgba(34,197,94,0.6);
  }

  .banner-red {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.4);
    color: var(--red);
  }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .player-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.85rem;
  }

  .player-chip.me {
    border-color: var(--purple);
    background: rgba(168,85,247,0.08);
  }

  .player-chip.empty {
    border-style: dashed;
    color: rgba(255,255,255,0.2);
    font-size: 0.8rem;
    justify-content: center;
  }

  .p-name { font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .p-boat { font-size: 1rem; flex-shrink: 0; }
  .has-b { filter: drop-shadow(0 0 6px rgba(34,197,94,0.8)); }
  .no-b { opacity: 0.4; }

  /* ── CHAT ── */
  .room-right {
    background: rgba(10,10,26,0.9);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    height: 480px;
  }

  .chat-header {
    padding: 14px 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--purple);
    border-bottom: 1px solid var(--border);
  }

  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--purple) transparent;
  }

  .msg { display: flex; flex-direction: column; gap: 2px; max-width: 90%; }
  .msg-me  { align-self: flex-end;  align-items: flex-end;  }
  .msg-other { align-self: flex-start; align-items: flex-start; }

  .msg-name {
    font-size: 0.7rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .msg-text {
    padding: 7px 12px;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.4;
    word-break: break-word;
  }

  .msg-me .msg-text {
    background: linear-gradient(135deg, var(--purple2), var(--purple));
    color: white;
  }

  .msg-other .msg-text {
    background: rgba(255,255,255,0.07);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--purple); }
  .chat-input::placeholder { color: var(--text-dim); }

  .btn-send {
    padding: 9px 16px;
    background: linear-gradient(135deg, var(--purple2), var(--purple));
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(168,85,247,0.4);
  }

  .btn-send:hover { opacity: 0.85; transform: scale(1.05); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--purple); }
</style>
