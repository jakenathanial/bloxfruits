<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RentAFruit 🍊 Leviathan Hunt & Trading</title>
<meta name="description" content="RentAFruit is a free community matchmaking tool for Blox Fruits players. Find Leviathan Hunt rooms and trade Devil Fruits and Game Passes with other players."/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#07071a; --card:#0e0e28; --purple:#b06ef3; --purple2:#7c3aed;
    --blue:#4f9ef8; --blue2:#22d3ee; --green:#34d399; --red:#f87171;
    --yellow:#fbbf24; --orange:#fb923c; --text:#eef2ff; --muted:#8b9bb4;
    --border:rgba(176,110,243,0.18); --gp:0 0 24px rgba(176,110,243,0.45);
    --gb:0 0 24px rgba(79,158,248,0.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(176,110,243,0.1) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(79,158,248,0.08) 0%,transparent 55%);pointer-events:none;z-index:0;}
  #app{position:relative;z-index:1;min-height:100vh;}

  /* LOADER */
  .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}
  .loader-fruit{font-size:52px;animation:bounce 1s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .loader-text{font-size:1rem;font-weight:700;color:var(--purple);letter-spacing:2px;}
  .loader-sub{font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:1px;}
  .loader-bar-wrap{width:220px;height:6px;background:rgba(176,110,243,0.15);border-radius:99px;overflow:hidden;border:1px solid rgba(176,110,243,0.2);}
  .loader-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--purple2),var(--purple),var(--blue2));border-radius:99px;transition:width 0.4s ease;box-shadow:0 0 10px rgba(176,110,243,0.6);}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-glow{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(176,110,243,0.13) 0%,transparent 65%);animation:breathe 4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:1}50%{opacity:0.5}}
  .login-box{position:relative;background:rgba(14,14,40,0.97);border:1.5px solid var(--border);border-radius:24px;padding:48px 40px;max-width:430px;width:100%;text-align:center;box-shadow:var(--gp),0 32px 64px rgba(0,0,0,0.55);animation:floatin 0.5s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes floatin{from{opacity:0;transform:translateY(24px) scale(0.96)}to{opacity:1;transform:none}}
  .login-fruit{font-size:68px;display:block;filter:drop-shadow(0 0 20px rgba(176,110,243,0.9));margin-bottom:10px;}
  .login-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;background:linear-gradient(130deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .login-sub{font-size:0.7rem;letter-spacing:4px;color:var(--muted);font-weight:700;margin-top:4px;}
  .login-desc{margin:18px 0 26px;color:var(--muted);font-size:1.02rem;line-height:1.6;}
  .divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .divider span{font-size:0.78rem;color:var(--muted);font-weight:700;}
  .btn-google{display:flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:14px 20px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.13);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.22s;}
  .btn-google:hover{background:rgba(255,255,255,0.11);transform:translateY(-2px);}
  .btn-google:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .btn-guest{display:flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:13px 20px;margin-top:10px;background:rgba(176,110,243,0.1);border:1.5px solid rgba(176,110,243,0.3);border-radius:12px;color:var(--purple);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.22s;}
  .btn-guest:hover{background:rgba(176,110,243,0.18);transform:translateY(-2px);}
  .login-err{margin-top:14px;padding:10px 14px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:9px;color:var(--red);font-size:0.85rem;display:none;}

  /* GUEST MODAL */
  .guest-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:999;align-items:center;justify-content:center;}
  .guest-modal.show{display:flex;}
  .guest-box{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:36px 32px;max-width:360px;width:92%;text-align:center;box-shadow:var(--gp);animation:floatin 0.35s ease;}
  .guest-box h3{font-size:1.4rem;font-weight:800;margin-bottom:6px;}
  .guest-box p{color:var(--muted);font-size:0.95rem;margin-bottom:20px;}
  .name-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;outline:none;transition:border-color 0.2s;margin-bottom:14px;}
  .name-input:focus{border-color:var(--purple);}
  .name-input::placeholder{color:var(--muted);}
  .btn-enter{width:100%;padding:13px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:11px;color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .btn-enter:hover{transform:translateY(-2px);}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;background:rgba(7,7,26,0.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .topbar-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1rem;background:linear-gradient(90deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;letter-spacing:1px;user-select:none;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--purple);object-fit:cover;}
  .uname{font-size:0.88rem;font-weight:700;color:var(--muted);display:none;}
  @media(min-width:480px){.uname{display:block;}}
  .btn-sm{padding:6px 13px;background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn-sm:hover{border-color:var(--purple);color:var(--purple);}

  /* NAVBAR */
  .navbar{display:flex;align-items:center;gap:4px;padding:8px 22px;background:rgba(7,7,26,0.88);border-bottom:1px solid rgba(176,110,243,0.1);overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;}
  .navbar::-webkit-scrollbar{display:none;}
  .nav-link{padding:6px 14px;border-radius:20px;font-size:0.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;border:1.5px solid transparent;position:relative;}
  .nav-link:hover{color:var(--text);background:rgba(176,110,243,0.1);}
  .nav-link.active{color:var(--purple);background:rgba(176,110,243,0.12);border-color:rgba(176,110,243,0.3);}
  .nav-link.admin{color:var(--yellow);}
  .nav-link.admin:hover{background:rgba(251,191,36,0.1);}
  .nav-link.admin.active{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.4);}
  .nav-badge{display:none;position:absolute;top:2px;right:6px;background:var(--red);color:#fff;border-radius:99px;font-size:0.58rem;font-weight:800;padding:1px 5px;min-width:16px;text-align:center;line-height:1.5;}
  .nav-badge.show{display:block;}

  /* MAIN */
  .main{max-width:1080px;margin:0 auto;padding:26px 18px;}

  /* PROFILE PANEL */
  .profile-panel{background:rgba(176,110,243,0.06);border:1.5px solid var(--border);border-radius:18px;padding:16px 20px;margin-bottom:30px;}
  .profile-inner{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .profile-avatar{width:50px;height:50px;border-radius:50%;border:2px solid var(--purple);object-fit:cover;box-shadow:0 0 12px rgba(176,110,243,0.4);}
  .profile-name{font-size:1rem;font-weight:800;color:var(--purple);}
  .profile-badge{font-size:0.75rem;color:var(--muted);font-weight:600;margin-top:2px;}
  .boat-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .boat-label{font-size:0.9rem;font-weight:700;color:var(--text);}
  .toggle-wrap{display:flex;align-items:center;gap:8px;}
  .switch{position:relative;display:inline-block;width:52px;height:28px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.15);border-radius:28px;transition:0.3s;}
  .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:0.3s;}
  input:checked+.slider{background:rgba(52,211,153,0.25);border-color:var(--green);}
  input:checked+.slider::before{transform:translateX(24px);background:var(--green);box-shadow:0 0 10px var(--green);}
  .boat-indicator{display:flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:800;padding:5px 12px;border-radius:20px;transition:all 0.3s;}
  .boat-indicator.on{background:rgba(52,211,153,0.15);color:var(--green);border:1.5px solid rgba(52,211,153,0.35);}
  .boat-indicator.off{background:rgba(248,113,113,0.12);color:var(--red);border:1.5px solid rgba(248,113,113,0.3);}
  .dot{width:8px;height:8px;border-radius:50%;}
  .dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite;}
  .dot.off{background:var(--red);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

  /* HERO */
  .hero{text-align:center;margin-bottom:36px;}
  .hero-eye{font-size:0.72rem;letter-spacing:5px;color:var(--muted);font-weight:700;margin-bottom:8px;}
  .hero-h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,4vw,2.4rem);font-weight:900;line-height:1.25;}
  .grad{background:linear-gradient(90deg,var(--purple),var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hero-tip{margin-top:10px;font-size:0.9rem;color:var(--muted);font-weight:600;}

  /* DEST CARDS */
  .dest-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;}
  .dest-card{position:relative;overflow:hidden;background:rgba(14,14,40,0.9);border:1.5px solid var(--border);border-radius:20px;padding:38px 26px;text-align:center;cursor:pointer;transition:all 0.28s ease;animation:floatin 0.45s ease both;}
  .dest-card:hover{transform:translateY(-7px);border-color:var(--purple);box-shadow:var(--gp),0 20px 40px rgba(0,0,0,0.4);}
  .dest-card:nth-child(2):hover{border-color:var(--blue);box-shadow:var(--gb),0 20px 40px rgba(0,0,0,0.4);}
  .dest-glow{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(176,110,243,0.12),transparent 70%);pointer-events:none;}
  .dest-glow.b{background:radial-gradient(circle,rgba(79,158,248,0.12),transparent 70%);}
  .dest-icon{font-size:58px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 14px rgba(176,110,243,0.7));}
  .dest-name{font-size:1.2rem;font-weight:900;margin-bottom:6px;}
  .dest-desc{font-size:0.85rem;color:var(--muted);margin-bottom:16px;font-weight:600;}
  .dest-cta{font-size:0.88rem;font-weight:800;color:var(--purple);display:flex;align-items:center;justify-content:center;gap:6px;}
  .dest-card:nth-child(2) .dest-cta{color:var(--blue);}

  /* PAGE HEADER */
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
  .page-title{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:900;color:var(--purple);letter-spacing:1px;}
  .btn-back{padding:8px 14px;background:transparent;border:1.5px solid var(--border);border-radius:9px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn-back:hover{border-color:var(--purple);color:var(--purple);}
  .btn-create{padding:10px 20px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.25s;box-shadow:0 0 18px rgba(176,110,243,0.4);}
  .btn-create:hover{transform:translateY(-2px);}
  .btn-create:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

  /* ROOM LIST */
  .room-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:15px;min-height:120px;}
  .room-card{background:rgba(14,14,40,0.94);border:1.5px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all 0.25s;animation:floatin 0.35s ease both;}
  .room-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:var(--gb);}
  .room-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .room-host{font-size:0.95rem;font-weight:800;}
  .timer-pill{font-size:0.7rem;font-weight:800;color:var(--blue2);background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.3);padding:3px 9px;border-radius:20px;}
  .room-stats{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .room-count{font-size:0.85rem;color:var(--muted);font-weight:600;}
  .room-count.full{color:var(--red);font-weight:800;}
  .room-beast{font-size:0.82rem;font-weight:800;}
  .room-beast.yes{color:var(--green);}
  .room-beast.no{color:var(--red);}
  .btn-join{width:100%;padding:9px;background:linear-gradient(90deg,var(--blue2),var(--blue));border:none;border-radius:9px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.18s;}
  .btn-join:hover{opacity:0.85;transform:translateY(-1px);}
  .btn-join.full{background:rgba(255,255,255,0.07);color:var(--muted);cursor:not-allowed;transform:none;}
  .empty-msg{grid-column:1/-1;text-align:center;color:var(--muted);padding:55px 20px;border:1.5px dashed var(--border);border-radius:16px;font-size:0.95rem;font-weight:600;}

  /* ROOM VIEW */
  .room-layout{display:grid;grid-template-columns:1fr;gap:18px;}
  @media(min-width:768px){.room-layout{grid-template-columns:1fr 360px;align-items:start;}}
  .room-title-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
  .room-h2{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:900;color:var(--purple);text-shadow:0 0 16px rgba(176,110,243,0.65);}
  .room-timer-pill{font-size:0.82rem;font-weight:800;color:var(--blue2);background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.3);padding:6px 14px;border-radius:20px;}
  .beast-banner{padding:11px 16px;border-radius:11px;font-size:0.85rem;font-weight:800;letter-spacing:1px;text-align:center;margin-bottom:16px;}
  .beast-banner.yes{background:rgba(52,211,153,0.1);border:1.5px solid rgba(52,211,153,0.4);color:var(--green);}
  .beast-banner.no{background:rgba(248,113,113,0.1);border:1.5px solid rgba(248,113,113,0.35);color:var(--red);}
  .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;}
  .p-chip{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:9px 11px;font-size:0.84rem;font-weight:700;}
  .p-chip.me{border-color:var(--purple);background:rgba(176,110,243,0.09);}
  .p-chip.empty{border-style:dashed;color:rgba(255,255,255,0.18);font-size:0.78rem;justify-content:center;font-weight:600;}
  .p-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .p-boat{font-size:0.95rem;flex-shrink:0;}
  .p-boat.yes{filter:drop-shadow(0 0 5px rgba(52,211,153,0.9));}
  .p-boat.no{opacity:0.3;}

  /* CHAT */
  .chat-panel{background:rgba(14,14,40,0.95);border:1.5px solid var(--border);border-radius:18px;display:flex;flex-direction:column;height:490px;}
  .chat-head{padding:13px 16px;font-size:0.88rem;font-weight:800;color:var(--purple);border-bottom:1px solid var(--border);flex-shrink:0;}
  .chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(176,110,243,0.35) transparent;}
  .msg{display:flex;flex-direction:column;gap:3px;max-width:86%;}
  .msg.me{align-self:flex-end;align-items:flex-end;}
  .msg.other{align-self:flex-start;align-items:flex-start;}
  .msg-who{font-size:0.68rem;color:var(--muted);font-weight:700;margin:0 4px;}
  .msg-txt{padding:8px 13px;border-radius:12px;font-size:0.9rem;line-height:1.45;word-break:break-word;font-weight:600;}
  .msg.me .msg-txt{background:linear-gradient(130deg,var(--purple2),var(--purple));color:#fff;}
  .msg.other .msg-txt{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.07);}
  .chat-foot{display:flex;gap:8px;padding:11px;border-top:1px solid var(--border);flex-shrink:0;}
  .chat-input{flex:1;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.93rem;font-weight:600;outline:none;transition:border-color 0.2s;}
  .chat-input:focus{border-color:var(--purple);}
  .chat-input::placeholder{color:var(--muted);}
  .btn-send{padding:9px 15px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:10px;color:#fff;font-size:1rem;cursor:pointer;transition:all 0.18s;}
  .btn-send:hover{opacity:0.85;transform:scale(1.06);}

  /* ── TRADE PAGE ── */
  .section-title{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--purple);letter-spacing:1px;margin-bottom:6px;}
  .section-desc{color:var(--muted);font-size:0.9rem;line-height:1.6;font-weight:600;margin-bottom:20px;}
  .trade-form-box{background:rgba(14,14,40,0.92);border:1.5px solid var(--border);border-radius:18px;padding:22px;margin-bottom:28px;}
  .trade-form-title{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:16px;}
  .trade-sides{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px;}
  @media(max-width:560px){.trade-sides{grid-template-columns:1fr;}}
  .trade-side-label{font-size:0.8rem;font-weight:800;letter-spacing:1px;margin-bottom:10px;}
  .trade-side-label.want{color:var(--blue2);}
  .trade-side-label.offer{color:var(--green);}
  .fruit-slots{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .fruit-slot{background:rgba(255,255,255,0.04);border:1.5px dashed rgba(255,255,255,0.12);border-radius:10px;padding:8px;text-align:center;cursor:pointer;transition:all 0.2s;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:0.75rem;color:var(--muted);font-weight:700;}
  .fruit-slot:hover{border-color:var(--purple);background:rgba(176,110,243,0.07);}
  .fruit-slot.filled{border-style:solid;border-color:rgba(176,110,243,0.35);background:rgba(176,110,243,0.08);}
  .fruit-slot img{width:36px;height:36px;object-fit:contain;border-radius:6px;background:transparent;}
  .fruit-slot .slot-name{font-size:0.7rem;font-weight:800;color:var(--text);}
  .fruit-slot .slot-val{font-size:0.65rem;color:var(--muted);}

<body>

<div id="app">
  <div class="loader">
    <span class="loader-fruit">🍊</span>
    <div class="loader-text" id="loaderText">Loading...</div>
    <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
    <div class="loader-sub" id="loaderSub">Connecting to servers...</div>
  </div>
</div>

<!-- Guest Modal -->
<div class="guest-modal" id="guestModal">
  <div class="guest-box">
    <h3>👋 Hey there!</h3>
    <p>What should we call you? Pick a fun name!</p>
    <input type="text" id="guestNameInput" class="name-input" placeholder="e.g. CoolHunter99" maxlength="24" onkeypress="if(event.key==='Enter') confirmGuest()"/>
    <button class="btn-enter" onclick="confirmGuest()">Let's Go! 🚀</button>
  </div>
</div>

<!-- Fruit Picker Modal -->
<div class="fruit-picker-modal" id="fruitPickerModal">
  <div class="fruit-picker-box">
    <div class="fruit-picker-head">
      <h3>🍊 Pick a Fruit or Game Pass</h3>
      <button class="btn-close-modal" onclick="closeFruitPicker()">✕</button>
    </div>
    <div class="fruit-picker-grid" id="fruitPickerGrid">
      <div class="no-fruits-msg">Loading fruits...</div>
    </div>
  </div>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAnalytics }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, push, update, remove, onValue, off }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDlBIeNVDK5nBPpVFkFSxNY59e7gW-p18c",
    authDomain:"rentafruit-f57d9.firebaseapp.com",
    projectId:"rentafruit-f57d9",
    storageBucket:"rentafruit-f57d9.firebasestorage.app",
    messagingSenderId:"66702277537",
    appId:"1:66702277537:web:e7f210f38252ad4fd0e9e0",
    measurementId:"G-0J9TNJNEV5",
    databaseURL:"https://rentafruit-f57d9-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  const app      = initializeApp(firebaseConfig);
  const analytics= getAnalytics(app);
  const auth     = getAuth(app);
  const db       = getDatabase(app);
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt:"select_account" });

  /* ── STATE ── */
  let currentUser=null, currentRoom=null, currentDestination=null, currentView="home";
  let roomsListener=null, roomDocListener=null, chatListener=null;
  let tradesListener=null, fruitsListener=null;
  let inboxListener=null, convListener=null;
  let roomTimerInterval=null;
  let isGuest=false;
  let tradeWants=[null,null,null,null], tradeOffers=[null,null,null,null];
  let pickerTarget=null, fruitsCache={};
  let currentConvId=null, openTradeFilter=null;
  let inboxUnread=0;

  // FIX: Store latest trades snapshot so we can re-render when fruits arrive
  let latestTradesSnapshot=[];
  let fruitsReady=false;

  const ADMIN_EMAILS=["jakelordclash@gmail.com","calvinthomasvinosh@gmail.com"];
  const isAdmin=()=> ADMIN_EMAILS.includes(currentUser?.email);

  /* ── LOADER ── */
  const steps=[{p:15,m:"Importing Firebase..."},{p:35,m:"Connecting to database..."},{p:55,m:"Checking auth..."},{p:75,m:"Loading your profile..."},{p:90,m:"Almost ready..."},{p:100,m:"Done! 🍊"}];
  let stepIdx=0;
  function advLoader(msg){ const b=document.getElementById("loaderBar"),s=document.getElementById("loaderSub"); if(stepIdx<steps.length){const st=steps[stepIdx++];if(b)b.style.width=st.p+"%";if(s)s.textContent=msg||st.m;} }
  setTimeout(()=>advLoader(),100); setTimeout(()=>advLoader(),600); setTimeout(()=>advLoader(),1200);

  let authResolved=false;
  const authTimeout=setTimeout(()=>{ if(!authResolved&&!isGuest){advLoader("Session timeout — please sign in.");renderApp("login");} },8000);

  /* ── AUTH ── */
  window.loginWithGoogle=async()=>{
    const btn=document.getElementById("loginBtn"),err=document.getElementById("loginErr");
    if(btn)btn.disabled=true; if(err)err.style.display="none";
    try{ await signInWithPopup(auth,provider); }
    catch(e){
      if(btn)btn.disabled=false;
      if(err){ err.style.display="block";
        if(e.code==="auth/popup-blocked") err.textContent="⚠️ Popup blocked! Allow popups for this site.";
        else if(e.code==="auth/popup-closed-by-user") err.textContent="You closed the window. Try again!";
        else if(e.code==="auth/unauthorized-domain") err.textContent="Domain not authorised in Firebase.";
        else err.textContent="Sign-in failed: "+e.code;
      }
    }
  };

  window.showGuestModal=()=>{ document.getElementById("guestModal").classList.add("show"); setTimeout(()=>document.getElementById("guestNameInput")?.focus(),100); };
  window.confirmGuest=()=>{
    const inp=document.getElementById("guestNameInput"),name=inp?.value.trim();
    if(!name||name.length<2){inp.style.borderColor="var(--red)";return;}
    document.getElementById("guestModal").classList.remove("show");
    isGuest=true; currentUser={uid:"guest_"+Math.random().toString(36).slice(2,10),displayName:name,photoURL:"https://api.dicebear.com/7.x/bottts/svg?seed="+encodeURIComponent(name)};
    window._myBoat=false; renderApp("home");
  };
  window.logOut=async()=>{ cleanupAll(); if(isGuest){isGuest=false;currentUser=null;window._myBoat=false;renderApp("login");}else{await signOut(auth);} };

  onAuthStateChanged(auth,async(user)=>{
    if(isGuest)return; authResolved=true; clearTimeout(authTimeout);
    currentUser=user;
    if(user){
      advLoader("Loading your profile...");
      const uRef=ref(db,"users/"+user.uid);
      try{
        const snap=await get(uRef);
        if(!snap.exists()) await set(uRef,{uid:user.uid,name:user.displayName,photo:user.photoURL,hasBeastBoat:false});
        const data=snap.exists()?snap.val():{hasBeastBoat:false};
        window._myBoat=data.hasBeastBoat===true;
      }catch(e){console.error("[PROFILE]",e.message);window._myBoat=false;}
      advLoader("Done! 🍊");
      setTimeout(()=>{ renderApp("home"); listenInboxBadge(); },300);
    }else{ advLoader("Ready!"); setTimeout(()=>renderApp("login"),200); }
  },(err)=>{ authResolved=true;clearTimeout(authTimeout);renderApp("login"); });

  /* ── BOAT TOGGLE ── */
  window.toggleBeastBoat=async()=>{
    const v=!window._myBoat; window._myBoat=v;
    const ind=document.getElementById("boatIndicator"),tog=document.getElementById("boatToggle");
    if(ind){ind.className="boat-indicator "+(v?"on":"off");ind.innerHTML=`<span class="dot ${v?"on":"off"}"></span>${v?"🚢 Active!":"Not Active"}`;}
    if(tog)tog.checked=v;
    if(!isGuest&&currentUser?.uid) try{await update(ref(db,"users/"+currentUser.uid),{hasBeastBoat:v});}catch(e){}
  };

  /* ── NAVIGATION ── */
  window.goHome=()=>{ cleanupListeners(); currentRoom=null;currentDestination=null; renderApp("home"); };
  window.goDestination=(dest)=>{ cleanupListeners(); currentDestination=dest; renderApp("destination"); listenRooms(dest); };
  window.goTrade=()=>{ cleanupListeners(); latestTradesSnapshot=[];fruitsReady=false; renderApp("trade"); listenFruitsCache(); listenTrades(); };
  window.goAbout=()=>{ cleanupListeners(); renderApp("about"); };
  window.goContact=()=>{ cleanupListeners(); renderApp("contact"); };
  window.goPrivacy=()=>{ cleanupListeners(); renderApp("privacy"); };
  window.goTerms=()=>{ cleanupListeners(); renderApp("terms"); };
  window.goAdmin=()=>{ if(!isAdmin())return; cleanupListeners(); renderApp("admin"); listenFruitsAdmin(); };
  // FIX: openTradeFilter exposed on window so inline HTML can clear it
  window.goInbox=(convId,tradeFilter)=>{
    cleanupListeners(); currentConvId=convId||null; openTradeFilter=tradeFilter||null;
    renderApp("inbox"); listenInbox();
    if(currentConvId) setTimeout(()=>openConvById(currentConvId),300);
  };
  window.clearInboxFilter=()=>{ openTradeFilter=null; window.goInbox(); };

  function cleanupListeners(){
    if(roomsListener){off(roomsListener);roomsListener=null;}
    if(roomDocListener){off(roomDocListener);roomDocListener=null;}
    if(chatListener){off(chatListener);chatListener=null;}
    if(tradesListener){off(tradesListener);tradesListener=null;}
    if(fruitsListener){off(fruitsListener);fruitsListener=null;}
    if(inboxListener){off(inboxListener);inboxListener=null;}
    if(convListener){off(convListener);convListener=null;}
    if(roomTimerInterval){clearInterval(roomTimerInterval);roomTimerInterval=null;}
  }
  function cleanupAll(){ cleanupListeners(); }

  /* ── INBOX BADGE ── */
  function listenInboxBadge(){
    if(!currentUser||isGuest)return;
    const r=ref(db,"inboxMeta/"+currentUser.uid);
    onValue(r,(snap)=>{
      let total=0;
      if(snap.exists()) snap.forEach(c=>{ total+=(c.val().unread||0); });
      inboxUnread=total;
      const badge=document.getElementById("inboxNavBadge");
      if(badge){ badge.textContent=total>9?"9+":String(total); badge.className="nav-badge"+(total>0?" show":""); }
    });
  }

  /* ── ROOMS ── */
  function listenRooms(dest){
    const r=ref(db,"rooms"); roomsListener=r;
    onValue(r,(snap)=>{
      const now=Date.now(),rooms=[];
      if(snap.exists()) snap.forEach(c=>{
        const rm={id:c.key,...c.val()};
        if(rm.expiresAt&&rm.expiresAt<now){remove(ref(db,"rooms/"+c.key));return;}
        if(rm.destination===dest)rooms.push(rm);
      });
      renderRoomList(rooms);
    });
  }
  function renderRoomList(rooms){
    const el=document.getElementById("roomList"); if(!el)return;
    if(!rooms.length){el.innerHTML=`<div class="empty-msg">😴 No rooms yet!<br/>Hit <b>✨ Create Room</b> to start the hunt!</div>`;return;}
    el.innerHTML=rooms.map(r=>{
      const pl=r.players?Object.values(r.players):[];
      const hb=pl.some(p=>p.hasBeastBoat===true),full=pl.length>=7;
      const rem=r.expiresAt?Math.max(0,r.expiresAt-Date.now()):0;
      const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
      return `<div class="room-card" onclick="enterRoom('${r.id}')">
        <div class="room-head"><span class="room-host">👑 ${r.host||"Unknown"}</span><span class="timer-pill">⏱ ${m}m ${s}s</span></div>
        <div class="room-stats"><span class="room-count ${full?"full":""}">👥 ${pl.length}/7 players</span>
        <span class="room-beast ${hb?"yes":"no"}">${hb?"🚢 Beast Hunter Available!":"❌ No Beast Hunter yet"}</span></div>
        <button class="btn-join ${full?"full":""}" onclick="event.stopPropagation();joinRoom('${r.id}')">${full?"Room Full 😔":"Join Room →"}</button>
      </div>`;
    }).join("");
  }

  window.createRoom=async()=>{
    if(!currentUser||!currentDestination)return;
    const btn=document.querySelector(".btn-create");
    if(btn){btn.disabled=true;btn.textContent="Creating... ✨";}
    const now=Date.now(),rid=push(ref(db,"rooms")).key;
    try{
      await set(ref(db,"rooms/"+rid),{destination:currentDestination,host:currentUser.displayName,hostUid:currentUser.uid,createdAt:now,expiresAt:now+3600000,
        players:{[currentUser.uid]:{uid:currentUser.uid,name:currentUser.displayName,hasBeastBoat:window._myBoat===true}}});
      enterRoom(rid);
    }catch(e){alert("❌ Couldn't create room!\n"+e.message);if(btn){btn.disabled=false;btn.textContent="✨ Create Room";}}
  };

  window.joinRoom=async(rid)=>{
    try{
      const snap=await get(ref(db,"rooms/"+rid));
      if(!snap.exists()){alert("Room no longer exists!");return;}
      const r=snap.val(),pl=r.players?Object.values(r.players):[];
      if(pl.length>=7){alert("😔 Room is full!");return;}
      if(r.players&&r.players[currentUser.uid]){enterRoom(rid);return;}
      await update(ref(db,"rooms/"+rid+"/players"),{[currentUser.uid]:{uid:currentUser.uid,name:currentUser.displayName,hasBeastBoat:window._myBoat===true}});
      enterRoom(rid);
    }catch(e){alert("Couldn't join room. Try again!");}
  };

  window.leaveRoom=async()=>{
    if(!currentRoom)return;
    try{
      await remove(ref(db,"rooms/"+currentRoom+"/players/"+currentUser.uid));
      const snap=await get(ref(db,"rooms/"+currentRoom+"/players"));
      if(!snap.exists()||!Object.keys(snap.val()||{}).length) await remove(ref(db,"rooms/"+currentRoom));
    }catch(e){}
    cleanupListeners(); currentRoom=null; renderApp("destination"); listenRooms(currentDestination);
  };

  window.enterRoom=(rid)=>{ cleanupListeners(); currentRoom=rid; renderApp("room"); listenRoomDoc(rid); listenChat(rid); };

  function listenRoomDoc(rid){
    const r=ref(db,"rooms/"+rid); roomDocListener=r;
    let last=null;
    onValue(r,(snap)=>{
      if(!snap.exists()){goDestination(currentDestination);return;}
      const rm={id:rid,...snap.val()};
      if(rm.expiresAt&&rm.expiresAt<Date.now()){remove(r);goDestination(currentDestination);return;}
      last=rm; renderRoomView(rm);
    });
    if(roomTimerInterval)clearInterval(roomTimerInterval);
    roomTimerInterval=setInterval(()=>{
      if(!last)return;
      const pill=document.getElementById("roomTimerPill"); if(!pill){clearInterval(roomTimerInterval);return;}
      const rem=last.expiresAt?Math.max(0,last.expiresAt-Date.now()):0;
      if(!rem){remove(ref(db,"rooms/"+rid));goDestination(currentDestination);return;}
      pill.textContent=`⏱ ${Math.floor(rem/60000)}:${String(Math.floor((rem%60000)/1000)).padStart(2,"0")}`;
    },1000);
  }
  function renderRoomView(r){
    const pl=r.players?Object.values(r.players):[],hb=pl.some(p=>p.hasBeastBoat===true);
    const rem=r.expiresAt?Math.max(0,r.expiresAt-Date.now()):0;
    const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
    const el=document.getElementById("roomContent"); if(!el)return;
    el.innerHTML=`<div class="room-title-row"><h2 class="room-h2">📍 ${r.destination}</h2><span class="room-timer-pill" id="roomTimerPill">⏱ ${m}:${String(s).padStart(2,"0")}</span></div>
      <div class="beast-banner ${hb?"yes":"no"}">${hb?"🚢 BEAST HUNTER IS HERE! You're all set!":"❌ No Beast Hunter yet — someone needs the boat!"}</div>
      <div class="player-grid">
        ${pl.map(p=>`<div class="p-chip ${p.uid===currentUser?.uid?"me":""}"><span class="p-name">${p.uid===currentUser?.uid?"⭐ You":p.name}</span><span class="p-boat ${p.hasBeastBoat?"yes":"no"}">${p.hasBeastBoat?"🚢":"🚫"}</span></div>`).join("")}
        ${Array(Math.max(0,7-pl.length)).fill(0).map(()=>`<div class="p-chip empty">Waiting...</div>`).join("")}
      </div>`;
  }

  function listenChat(rid){
    const r=ref(db,"chat/"+rid); chatListener=r;
    onValue(r,(snap)=>{
      const box=document.getElementById("chatBox"); if(!box)return;
      const msgs=[]; if(snap.exists())snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
      box.innerHTML=msgs.map(m=>{ const me=m.uid===currentUser?.uid;
        return `<div class="msg ${me?"me":"other"}"><span class="msg-who">${me?"You":m.name}</span><span class="msg-txt">${esc(m.text)}</span></div>`;
      }).join("");
      box.scrollTop=box.scrollHeight;
    });
  }
  window.sendMessage=async()=>{
    const inp=document.getElementById("chatInput"),text=inp?.value.trim();
    if(!text||!currentRoom)return; inp.value="";
    try{ const mr=push(ref(db,"chat/"+currentRoom)); await set(mr,{uid:currentUser.uid,name:currentUser.displayName,text,ts:Date.now()}); }catch(e){}
  };
  window.onChatKey=(e)=>{ if(e.key==="Enter")window.sendMessage(); };

  /* ── FRUITS CACHE ──
     FIX: fruitsCache must be loaded FIRST before trade list renders.
     We start both listeners but only render trades once fruitsReady=true.
     When fruits update, we re-render the trade list with the latest data.
  */
  function listenFruitsCache(){
    const r=ref(db,"fruits"); fruitsListener=r;
    onValue(r,(snap)=>{
      fruitsCache={};
      if(snap.exists())snap.forEach(c=>{fruitsCache[c.key]={id:c.key,...c.val()};});
      fruitsReady=true;
      // Re-render trade slots (form) if on trade page
      if(currentView==="trade") renderTradeSlots();
      // FIX: Re-render full trade list now that we have fruit data
      if(currentView==="trade" && latestTradesSnapshot.length>=0) renderTradeList(latestTradesSnapshot);
    });
  }

  /* ── FRUIT PICKER ── */
  window.openFruitPicker=(side,index)=>{
    pickerTarget={side,index};
    const grid=document.getElementById("fruitPickerGrid"),fruits=Object.values(fruitsCache);
    grid.innerHTML=fruits.length===0
      ?`<div class="no-fruits-msg">🍊 No fruits added yet!<br/>Admin needs to add fruits first.</div>`
      :fruits.map(f=>`<div class="fruit-picker-item" onclick="selectFruit('${f.id}')">
          <img src="${f.photo}" alt="${f.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDQiIGhlaWdodD0iNDQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHRleHQgeT0iMzAiIGZvbnQtc2l6ZT0iMzIiPvCfjooiPC90ZXh0Pjwvc3ZnPg=='"/>
          <div class="fp-name">${esc(f.name)}</div><div class="fp-val">💰 ${Number(f.value).toLocaleString()}</div>
          <div><span class="rarity rarity-${f.rarity}">${f.rarity}</span></div>
        </div>`).join("");
    document.getElementById("fruitPickerModal").classList.add("show");
  };
  window.selectFruit=(id)=>{
    if(!pickerTarget)return;
    const{side,index}=pickerTarget;
    if(side==="want")tradeWants[index]=id; else tradeOffers[index]=id;
    closeFruitPicker(); renderTradeSlots();
  };
  window.closeFruitPicker=()=>{ document.getElementById("fruitPickerModal").classList.remove("show");pickerTarget=null; };
  window.removeFromTrade=(side,index)=>{ if(side==="want")tradeWants[index]=null; else tradeOffers[index]=null; renderTradeSlots(); };

  function calcSideValue(arr){
    return arr.filter(Boolean).reduce((sum,id)=>sum+(fruitsCache[id]?Number(fruitsCache[id].value):0),0);
  }
  function renderTradeSlots(){
    ["want","offer"].forEach(side=>{
      const arr=side==="want"?tradeWants:tradeOffers;
      for(let i=0;i<4;i++){
        const el=document.getElementById(`slot-${side}-${i}`); if(!el)continue;
        const id=arr[i];
        if(id&&fruitsCache[id]){
          const f=fruitsCache[id]; el.className="fruit-slot filled";
          el.innerHTML=`<img src="${f.photo}" alt="${f.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzYiIGhlaWdodD0iMzYiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHRleHQgeT0iMjYiIGZvbnQtc2l6ZT0iMjYiPvCfjooiPC90ZXh0Pjwvc3ZnPg=='"/>
            <span class="slot-name">${esc(f.name)}</span><span class="slot-val">💰 ${Number(f.value).toLocaleString()}</span>
            <span class="remove-slot" onclick="removeFromTrade('${side}',${i})">✕ Remove</span>`;
          el.onclick=null;
        }else{
          el.className="fruit-slot"; el.innerHTML=`<span>+ Add Fruit</span>`; el.onclick=()=>openFruitPicker(side,i);
        }
      }
    });
    const wv=document.getElementById("wantTotal"),ov=document.getElementById("offerTotal");
    if(wv)wv.textContent="💰 "+calcSideValue(tradeWants).toLocaleString();
    if(ov)ov.textContent="💰 "+calcSideValue(tradeOffers).toLocaleString();
  }

  /* ── TRADE SYSTEM ──
     FIX: Store all trades in latestTradesSnapshot. Only render once fruitsReady.
     This ensures fruit images/names show correctly for ALL trade cards.
  */
  function listenTrades(){
    const r=ref(db,"trades"); tradesListener=r;
    onValue(r,(snap)=>{
      const trades=[];
      if(snap.exists())snap.forEach(c=>trades.push({id:c.key,...c.val()}));
      trades.sort((a,b)=>(b.ts||0)-(a.ts||0));
      // FIX: Always store latest, render only if fruits are ready
      latestTradesSnapshot=trades;
      if(fruitsReady) renderTradeList(trades);
      else {
        // Show placeholder while fruits load
        const el=document.getElementById("tradeList");
        if(el) el.innerHTML=`<div class="empty-msg" style="border:none;grid-column:1/-1">🔍 Loading fruit data...</div>`;
      }
    });
  }

  window.postTrade=async()=>{
    if(!currentUser){alert("Please sign in to post a trade!");return;}
    const existSnap=await get(ref(db,"trades"));
    if(existSnap.exists()){
      let hasOne=false;
      existSnap.forEach(c=>{ if(c.val().uid===currentUser.uid)hasOne=true; });
      if(hasOne){ alert("⚠️ You already have an active trade listing!\nPlease delete your existing trade before posting a new one."); return; }
    }
    const wl=tradeWants.filter(Boolean),ol=tradeOffers.filter(Boolean);
    if(!wl.length&&!ol.length){alert("Please add at least one fruit to either side!");return;}
    const btn=document.getElementById("postTradeBtn"); if(btn)btn.disabled=true;
    try{
      const tid=push(ref(db,"trades")).key;
      const wo={},oo={};
      wl.forEach((id,i)=>wo[i]=id); ol.forEach((id,i)=>oo[i]=id);
      await set(ref(db,"trades/"+tid),{uid:currentUser.uid,name:currentUser.displayName,wants:wo,offers:oo,ts:Date.now(),status:"open"});
      tradeWants=[null,null,null,null]; tradeOffers=[null,null,null,null];
      renderTradeSlots();
    }catch(e){alert("Couldn't post trade. Try again!");}
    if(btn)btn.disabled=false;
  };

  window.deleteTrade=async(tid)=>{
    if(!confirm("Delete this trade listing?"))return;
    try{ await remove(ref(db,"trades/"+tid)); }catch(e){}
  };

  /* FIX: renderTradeList - clicking a trade card goes to inbox, not public chat.
     Also fixed: poster name safely stored as data attribute to avoid quote injection in onclick strings.
  */
  function renderTradeList(trades){
    const el=document.getElementById("tradeList"); if(!el)return;
    if(!trades.length){el.innerHTML=`<div class="empty-msg" style="grid-column:1/-1">🤝 No trades posted yet!<br/>Be the first to post a trade offer above.</div>`;return;}
    el.innerHTML=trades.map((t,idx)=>{
      const wi=t.wants?Object.values(t.wants):[],oi=t.offers?Object.values(t.offers):[];
      const ta=getTimeAgo(t.ts),isOwn=currentUser&&t.uid===currentUser.uid;
      const canDel=currentUser&&(isOwn||isAdmin());
      const wTotal=wi.reduce((s,id)=>s+(fruitsCache[id]?Number(fruitsCache[id].value):0),0);
      const oTotal=oi.reduce((s,id)=>s+(fruitsCache[id]?Number(fruitsCache[id].value):0),0);
      const wHtml=wi.map(id=>fruitChipHtml(id)).join("");
      const oHtml=oi.map(id=>fruitChipHtml(id)).join("");

      // FIX: Use data-* attributes for safe name passing, JS onClick handled via event delegation
      const actionBtn=isOwn
        ?`<button class="btn-view-inquiries" data-action="inquiries" data-tid="${t.id}">📬 View Inquiries</button>`
        :(currentUser&&!isGuest?`<button class="btn-contact-trade" data-action="contact" data-tid="${t.id}" data-uid="${t.uid}" data-name="${esc(t.name)}">💬 Contact Trader → Inbox</button>`:"");

      return `<div class="trade-card" data-action="open-inbox" data-tid="${t.id}" data-uid="${t.uid}" data-name="${esc(t.name)}" data-own="${isOwn?'1':'0'}">
        <div class="trade-card-header"><span class="trade-poster">👤 ${esc(t.name)}${isOwn?` <span style="color:var(--muted);font-size:0.7rem">(you)</span>`:""}</span><span class="trade-time">${ta}</span></div>
        <div class="trade-card-totals">
          <div class="trade-card-total"><span style="color:var(--blue2);font-size:0.65rem">WANTS</span><span class="tcv">${wTotal?`💰 ${wTotal.toLocaleString()}`:"—"}</span></div>
          <div class="trade-card-total"><span style="color:var(--green);font-size:0.65rem">OFFERS</span><span class="tcv">${oTotal?`💰 ${oTotal.toLocaleString()}`:"—"}</span></div>
        </div>
        <div class="trade-card-body">
          <div class="trade-fruits"><div class="trade-side-tag want">WANTS</div>${wHtml||'<span style="color:var(--muted);font-size:0.78rem;font-weight:600">Anything</span>'}</div>
          <div class="trade-arrow">⇄</div>
          <div class="trade-fruits"><div class="trade-side-tag offer">OFFERS</div>${oHtml||'<span style="color:var(--muted);font-size:0.78rem;font-weight:600">Anything</span>'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;">${actionBtn}${canDel?`<button class="btn-delete-trade" data-action="delete" data-tid="${t.id}">🗑 Remove Listing</button>`:""}</div>
      </div>`;
    }).join("");

    // FIX: Event delegation — one listener on the list, handles all card/button clicks safely
    el.onclick=(e)=>{
      const btn=e.target.closest("[data-action]"); if(!btn)return;
      e.stopPropagation();
      const action=btn.dataset.action, tid=btn.dataset.tid, uid=btn.dataset.uid, name=btn.dataset.name, isOwn=btn.dataset.own==="1";
      if(action==="delete"){ window.deleteTrade(tid); }
      else if(action==="inquiries"){ window.goInbox(null,tid); }
      else if(action==="contact"){ window.startConversation(tid,uid,name); }
      else if(action==="open-inbox"){
        // Clicking whole card: if own trade → show inquiries, otherwise → contact trader
        if(isOwn){ window.goInbox(null,tid); }
        else if(currentUser&&!isGuest){ window.startConversation(tid,uid,name); }
        else { alert("Please sign in to contact traders!"); }
      }
    };
  }

  function fruitChipHtml(id){
    const f=fruitsCache[id];
    if(!f)return`<div class="trade-fruit-item"><span style="font-size:0.75rem;color:var(--muted)">Unknown</span></div>`;
    return`<div class="trade-fruit-item"><img src="${f.photo}" alt="${f.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjgiIGhlaWdodD0iMjgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHRleHQgeT0iMjAiIGZvbnQtc2l6ZT0iMjAiPvCfjooiPC90ZXh0Pjwvc3ZnPg=='"/>
      <div><div class="trade-fruit-name">${esc(f.name)}</div><div class="trade-fruit-val">💰 ${Number(f.value).toLocaleString()}</div></div></div>`;
  }
  function getTimeAgo(ts){ if(!ts)return""; const d=Date.now()-ts,m=Math.floor(d/60000); if(m<1)return"Just now"; if(m<60)return`${m}m ago`; const h=Math.floor(m/60); if(h<24)return`${h}h ago`; return`${Math.floor(h/24)}d ago`; }

  /* ── INBOX / CONVERSATION SYSTEM ──
     convId = tradeId + "__" + buyerUid
     FIX: convListener properly cleaned up before opening a new conversation.
     FIX: openTradeFilter properly exposed on window via clearInboxFilter().
  */
  window.startConversation=async(tradeId,posterId,posterName)=>{
    if(!currentUser||isGuest){alert("Please sign in to contact traders!");return;}
    if(currentUser.uid===posterId){window.goInbox(null,tradeId);return;}
    const convId=tradeId+"__"+currentUser.uid;
    const myMeta=await get(ref(db,"inboxMeta/"+currentUser.uid+"/"+convId));
    if(!myMeta.exists()){
      const now=Date.now();
      await set(ref(db,"inboxMeta/"+currentUser.uid+"/"+convId),{
        convId,tradeId,otherUid:posterId,otherName:posterName,tradeOwnerUid:posterId,
        myRole:"buyer",lastMsg:"",lastTs:now,unread:0
      });
      await set(ref(db,"inboxMeta/"+posterId+"/"+convId),{
        convId,tradeId,otherUid:currentUser.uid,otherName:currentUser.displayName,tradeOwnerUid:posterId,
        myRole:"poster",lastMsg:"",lastTs:now,unread:0
      });
    }
    window.goInbox(convId);
  };

  function listenInbox(){
    if(!currentUser||isGuest)return;
    const r=ref(db,"inboxMeta/"+currentUser.uid); inboxListener=r;
    onValue(r,(snap)=>{
      const convs=[];
      if(snap.exists())snap.forEach(c=>convs.push({id:c.key,...c.val()}));
      convs.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
      // FIX: Filter by trade if openTradeFilter is set
      const filtered=openTradeFilter?convs.filter(c=>c.tradeId===openTradeFilter):convs;
      renderConvSidebar(filtered);
      // If a convId was pre-selected, open it
      if(currentConvId){
        const found=convs.find(c=>c.id===currentConvId);
        if(found)renderConvArea(found);
      }
    });
  }

  function renderConvSidebar(convs){
    const el=document.getElementById("convList"); if(!el)return;
    if(!convs.length){
      el.innerHTML=`<div class="conv-empty-sidebar">📭 No conversations yet.<br/>Go to the Trade page and click "Contact Trader" to start chatting!</div>`;
      return;
    }
    el.innerHTML=convs.map(c=>{
      const isActive=currentConvId===c.id;
      const unread=c.unread||0;
      // FIX: Use data attribute for safe convId passing in sidebar
      return`<div class="conv-item ${isActive?"active":""}" data-conv-id="${c.id}">
        <div class="conv-item-top">
          <span class="conv-item-name">👤 ${esc(c.otherName)}</span>
          ${unread>0?`<span class="conv-unread-dot">${unread>9?"9+":unread}</span>`:""}
        </div>

  window.openConvById=async(convId)=>{

    // FIX: Kill previous conv listener before starting new one
    if(convListener){off(convListener);convListener=null;}
    const snap=await get(ref(db,"inboxMeta/"+currentUser.uid+"/"+convId));
    if(!snap.exists())return;
    const meta={id:convId,...snap.val()};
    renderConvArea(meta);
    // Mark as read
    await update(ref(db,"inboxMeta/"+currentUser.uid+"/"+convId),{unread:0});
    // Update sidebar active state
    document.querySelectorAll(".conv-item").forEach(el=>{
      el.classList.toggle("active",el.dataset.convId===convId);
    });
  };

  function renderConvArea(meta){
    const area=document.getElementById("convArea"); if(!area)return;
    area.innerHTML=`
      <div class="conv-area-head">
        <div class="conv-area-other">👤 ${esc(meta.otherName)}</div>
        <div class="conv-area-trade">Trade conversation ${meta.myRole==="poster"?"— someone is interested in your trade":"— about a trade listing"}</div>
      </div>
      <div class="conv-area-body" id="convMsgs"></div>
      <div class="conv-area-foot">
        <input id="convInput" class="chat-input" placeholder="Type a message..." onkeypress="onConvKey(event)"/>
        <button class="btn-send" onclick="sendConvMsg()">➤</button>
      </div>`;
    // FIX: Clean up old listener before attaching new one
    if(convListener){off(convListener);convListener=null;}
    const r=ref(db,"conversations/"+meta.id+"/messages"); convListener=r;
    onValue(r,(snap)=>{
      const box=document.getElementById("convMsgs"); if(!box)return;
      const msgs=[]; if(snap.exists())snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
      msgs.sort((a,b)=>(a.ts||0)-(b.ts||0));
      box.innerHTML=msgs.length===0
        ?`<div style="text-align:center;color:var(--muted);padding:30px;font-size:0.85rem;font-weight:600">No messages yet — say hi! 👋</div>`
        :msgs.map(m=>{ const me=m.uid===currentUser?.uid;
          return`<div class="msg ${me?"me":"other"}"><span class="msg-who">${me?"You":esc(m.name)}</span><span class="msg-txt">${esc(m.text)}</span></div>`;
        }).join("");
      box.scrollTop=box.scrollHeight;
    });
  }

  window.sendConvMsg=async()=>{
    if(!currentConvId||!currentUser)return;
    const inp=document.getElementById("convInput"),text=inp?.value.trim(); if(!text)return;
    inp.value="";
    try{
      const now=Date.now();
      const mr=push(ref(db,"conversations/"+currentConvId+"/messages"));
      await set(mr,{uid:currentUser.uid,name:currentUser.displayName,text,ts:now});
      const snap=await get(ref(db,"inboxMeta/"+currentUser.uid+"/"+currentConvId));
      if(snap.exists()){
        const meta=snap.val(),receiverUid=meta.otherUid;
        await update(ref(db,"inboxMeta/"+currentUser.uid+"/"+currentConvId),{lastMsg:text,lastTs:now});
        const rSnap=await get(ref(db,"inboxMeta/"+receiverUid+"/"+currentConvId));
        if(rSnap.exists()){
          const cur=rSnap.val().unread||0;
          await update(ref(db,"inboxMeta/"+receiverUid+"/"+currentConvId),{lastMsg:text,lastTs:now,unread:cur+1});
        }
      }
    }catch(e){console.error("[CONV]",e.message);}
  };
