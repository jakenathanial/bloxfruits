<body>

<div id="app">
  <div class="loader">
    <span class="loader-fruit">🍊</span>
    <div class="loader-text" id="loaderText">Loading...</div>
    <div class="loader-bar-wrap"><div class="loader-bar" id="loaderBar"></div></div>
    <div class="loader-sub" id="loaderSub">Connecting to servers...</div>
  </div>
</div>

<!-- Guest Modal -->
<div class="guest-modal" id="guestModal">
  <div class="guest-box">
    <h3>👋 Hey there!</h3>
    <p>What should we call you? Pick a fun name!</p>
    <input type="text" id="guestNameInput" class="name-input" placeholder="e.g. CoolHunter99" maxlength="24" onkeypress="if(event.key==='Enter') confirmGuest()"/>
    <button class="btn-enter" onclick="confirmGuest()">Let's Go! 🚀</button>
  </div>
</div>

<!-- Filter Modal -->
<div class="filter-modal" id="filterModal">
  <div class="filter-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <div><h3>🔍 Filter Trades</h3><p>Find trades matching specific fruits</p></div>
      <button class="btn-close-modal" onclick="closeFilterModal()">✕</button>
    </div>
    <div class="filter-sides">
      <div>
        <div class="filter-side-label want">They Want</div>
        <div class="filter-slots">
          <div class="filter-slot" id="fslot-want-0" onclick="openFilterPicker('want',0)"><span class="plus-icon">+</span></div>
          <div class="filter-slot" id="fslot-want-1" onclick="openFilterPicker('want',1)"><span class="plus-icon">+</span></div>
          <div class="filter-slot" id="fslot-want-2" onclick="openFilterPicker('want',2)"><span class="plus-icon">+</span></div>
          <div class="filter-slot" id="fslot-want-3" onclick="openFilterPicker('want',3)"><span class="plus-icon">+</span></div>
        </div>
      </div>
      <div>
        <div class="filter-side-label offer">They Offer</div>
        <div class="filter-slots">
          <div class="filter-slot" id="fslot-offer-0" onclick="openFilterPicker('offer',0)"><span class="plus-icon">+</span></div>
          <div class="filter-slot" id="fslot-offer-1" onclick="openFilterPicker('offer',1)"><span class="plus-icon">+</span></div>
          <div class="filter-slot" id="fslot-offer-2" onclick="openFilterPicker('offer',2)"><span class="plus-icon">+</span></div>
          <div class="filter-slot" id="fslot-offer-3" onclick="openFilterPicker('offer',3)"><span class="plus-icon">+</span></div>
        </div>
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-apply-filter" onclick="applyFilter()">✅ Apply Filter</button>
      <button class="btn-clear-filter" onclick="clearFilter()">✕ Clear</button>
    </div>
  </div>
</div>

<!-- Trade Detail Modal (info only — chat moved to Inbox) -->
<div class="trade-detail-modal" id="tradeDetailModal">
  <div class="trade-detail-box">
    <div class="trade-detail-head">
      <h3>🤝 Trade Details</h3>
      <button class="btn-close-modal" onclick="closeTradeDetail()">✕</button>
    </div>
    <div class="trade-detail-body" id="tradeDetailBody">Loading...</div>
  </div>
</div>

<!-- Fruit Picker Modal -->
<div class="fruit-picker-modal" id="fruitPickerModal">
  <div class="fruit-picker-box">
    <div class="fruit-picker-head">
      <h3>🍊 Pick a Fruit</h3>
      <button class="btn-close-modal" onclick="closeFruitPicker()">✕</button>
    </div>
    <div class="fruit-picker-grid" id="fruitPickerGrid">
      <div class="no-fruits-msg">Loading fruits...</div>
    </div>
  </div>
</div>

<script type="module">

  import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAnalytics }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, push, update, remove, onValue, off }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDlBIeNVDK5nBPpVFkFSxNY59e7gW-p18c",
    authDomain:"rentafruit-f57d9.firebaseapp.com",
    projectId:"rentafruit-f57d9",
    storageBucket:"rentafruit-f57d9.firebasestorage.app",
    messagingSenderId:"66702277537",
    appId:"1:66702277537:web:e7f210f38252ad4fd0e9e0",
    measurementId:"G-0J9TNJNEV5",
    databaseURL:"https://rentafruit-f57d9-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  const app=initializeApp(firebaseConfig);
  const analytics=getAnalytics(app);
  const auth=getAuth(app);
  const db=getDatabase(app);
  const provider=new GoogleAuthProvider();
  provider.setCustomParameters({prompt:"select_account"});

  /* ── STATE ── */
  let currentUser=null,currentRoom=null,currentDestination=null,currentView="home";
  let roomsListener=null,roomDocListener=null,chatListener=null;
  let tradesListener=null,fruitsListener=null;
  let inboxMetaListener=null,convMsgsListener=null;
  let roomTimerInterval=null;
  let isGuest=false;
  let tradeWants=[null,null,null,null],tradeOffers=[null,null,null,null];
  let pickerTarget=null,fruitsCache={},fruitsCacheReady=false;
  let filterWants=[null,null,null,null],filterOffers=[null,null,null,null],filterActive=false;
  let allTradesCache=[];
  let activeConvId=null;         // currently open conversation
  let inboxFilterTradeId=null;   // if viewing inquiries for a specific trade
  let globalUnread=0;

  /* Dual admin support */
  const ADMIN_EMAILS=["jakelordclash@gmail.com","calvinthomasvinosh@gmail.com"];
  const isAdmin=()=>ADMIN_EMAILS.includes(currentUser?.email);

  /* ── LOADER ── */
  const steps=[{p:15,m:"Importing Firebase..."},{p:35,m:"Connecting to database..."},{p:55,m:"Checking auth..."},{p:75,m:"Loading your profile..."},{p:90,m:"Almost ready..."},{p:100,m:"Done! 🍊"}];
  let stepIdx=0;
  function adv(msg){const b=document.getElementById("loaderBar"),s=document.getElementById("loaderSub");if(stepIdx<steps.length){const st=steps[stepIdx++];if(b)b.style.width=st.p+"%";if(s)s.textContent=msg||st.m;}}
  setTimeout(()=>adv(),100);setTimeout(()=>adv(),600);setTimeout(()=>adv(),1200);

  let authResolved=false;
  const authTimeout=setTimeout(()=>{if(!authResolved&&!isGuest){adv("Session timeout.");renderApp("login");}},8000);

  /* ── AUTH ── */
  window.loginWithGoogle=async()=>{
    const btn=document.getElementById("loginBtn"),err=document.getElementById("loginErr");
    if(btn)btn.disabled=true;if(err)err.style.display="none";
    try{await signInWithPopup(auth,provider);}
    catch(e){
      if(btn)btn.disabled=false;
      if(err){err.style.display="block";
        if(e.code==="auth/popup-blocked")err.textContent="⚠️ Popup blocked! Allow popups for this site.";
        else if(e.code==="auth/popup-closed-by-user")err.textContent="You closed the window. Try again!";
        else if(e.code==="auth/unauthorized-domain")err.textContent="Domain not authorised in Firebase.";
        else err.textContent="Sign-in failed: "+e.code;
      }
    }
  };

  window.showGuestModal=()=>{document.getElementById("guestModal").classList.add("show");setTimeout(()=>document.getElementById("guestNameInput")?.focus(),100);};
  window.confirmGuest=()=>{
    const inp=document.getElementById("guestNameInput"),name=inp?.value.trim();
    if(!name||name.length<2){inp.style.borderColor="var(--red)";return;}
    document.getElementById("guestModal").classList.remove("show");
    isGuest=true;
    currentUser={uid:"guest_"+Math.random().toString(36).slice(2,10),displayName:name,photoURL:"https://api.dicebear.com/7.x/bottts/svg?seed="+encodeURIComponent(name)};
    window._myBoat=false;renderApp("home");
  };
  window.logOut=async()=>{
    cleanupAll();
    if(isGuest){isGuest=false;currentUser=null;window._myBoat=false;renderApp("login");}
    else await signOut(auth);
  };

  onAuthStateChanged(auth,async(user)=>{
    if(isGuest)return;
    authResolved=true;clearTimeout(authTimeout);
    currentUser=user;
    if(user){
      adv("Loading your profile...");
      const uRef=ref(db,"users/"+user.uid);
      try{
        const snap=await get(uRef);
        if(!snap.exists())await set(uRef,{uid:user.uid,name:user.displayName,photo:user.photoURL,hasBeastBoat:false});
        const data=snap.exists()?snap.val():{hasBeastBoat:false};
        window._myBoat=data.hasBeastBoat===true;
      }catch(e){window._myBoat=false;}
      adv("Done! 🍊");
      setTimeout(()=>{renderApp("home");startInboxBadgeListener();},300);
    }else{adv("Ready!");setTimeout(()=>renderApp("login"),200);}
  },(err)=>{authResolved=true;clearTimeout(authTimeout);renderApp("login");});

  /* ── BOAT TOGGLE ── */
  window.toggleBeastBoat=async()=>{
    const v=!window._myBoat;window._myBoat=v;
    const ind=document.getElementById("boatIndicator"),tog=document.getElementById("boatToggle");
    if(ind){ind.className="boat-indicator "+(v?"on":"off");ind.innerHTML=`<span class="dot ${v?"on":"off"}"></span>${v?"🚢 Active!":"Not Active"}`;}
    if(tog)tog.checked=v;
    if(!isGuest&&currentUser?.uid)try{await update(ref(db,"users/"+currentUser.uid),{hasBeastBoat:v});}catch(e){}
  };

  /* ── CLEANUP ── */
  function cleanupListeners(){
    if(roomsListener){off(roomsListener);roomsListener=null;}
    if(roomDocListener){off(roomDocListener);roomDocListener=null;}
    if(chatListener){off(chatListener);chatListener=null;}
    if(tradesListener){off(tradesListener);tradesListener=null;}
    if(fruitsListener){off(fruitsListener);fruitsListener=null;}
    if(inboxMetaListener){off(inboxMetaListener);inboxMetaListener=null;}
    if(convMsgsListener){off(convMsgsListener);convMsgsListener=null;}
    if(roomTimerInterval){clearInterval(roomTimerInterval);roomTimerInterval=null;}
    fruitsCacheReady=false;
    activeConvId=null;inboxFilterTradeId=null;
  }
  function cleanupAll(){cleanupListeners();}

  /* ── NAV ── */
  window.goHome=()=>{cleanupListeners();currentRoom=null;currentDestination=null;renderApp("home");};
  window.goDestination=(dest)=>{cleanupListeners();currentDestination=dest;renderApp("destination");listenRooms(dest);};
  window.goTrade=()=>{cleanupListeners();renderApp("trade");listenFruitsCache(()=>listenTrades());};
  window.goInbox=(tradeId=null,openConvId=null)=>{
    cleanupListeners();
    inboxFilterTradeId=tradeId||null;
    activeConvId=openConvId||null;
    renderApp("inbox");
    if(!isGuest&&currentUser)startInboxListener();
  };
  window.goAbout=()=>{cleanupListeners();renderApp("about");};
  window.goContact=()=>{cleanupListeners();renderApp("contact");};
  window.goPrivacy=()=>{cleanupListeners();renderApp("privacy");};
  window.goTerms=()=>{cleanupListeners();renderApp("terms");};
  window.goAdmin=()=>{if(!isAdmin())return;cleanupListeners();renderApp("admin");listenFruitsAdmin();};

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     INBOX BADGE — global unread count
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function startInboxBadgeListener(){
    if(!currentUser||isGuest)return;
    const r=ref(db,"inboxMeta/"+currentUser.uid);
    onValue(r,(snap)=>{
      let total=0;
      if(snap.exists())snap.forEach(c=>{total+=(c.val().unread||0);});
      globalUnread=total;
      updateInboxBadge();
    });
  }

  function updateInboxBadge(){
    const badge=document.getElementById("inboxNavBadge");
    if(!badge)return;
    badge.textContent=globalUnread>9?"9+":String(globalUnread);
    badge.className="nav-unread"+(globalUnread>0?" show":"");
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     INBOX PAGE LISTENER
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function startInboxListener(){
    const r=ref(db,"inboxMeta/"+currentUser.uid);
    inboxMetaListener=r;
    onValue(r,(snap)=>{
      let convs=[];
      if(snap.exists())snap.forEach(c=>convs.push({id:c.key,...c.val()}));
      // Sort by last message time
      convs.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
      // Filter by trade if coming from "View Inquiries"
      if(inboxFilterTradeId)convs=convs.filter(c=>c.tradeId===inboxFilterTradeId);
      renderConvSidebar(convs);
      // Auto-open a conversation if specified
      if(activeConvId){
        const found=convs.find(c=>c.id===activeConvId);
        if(found)openConv(found);
      }
    });
  }

  function renderConvSidebar(convs){
    const el=document.getElementById("inboxConvList");if(!el)return;
    if(!convs.length){
      el.innerHTML=`<div class="inbox-empty">📭 No conversations yet.<br/>Go to <b>Trade</b> and click a listing to start chatting!</div>`;
      return;
    }
    el.innerHTML=convs.map(c=>{
      const isActive=activeConvId===c.id;
      const unread=c.unread||0;
      return`<div class="inbox-conv-item ${isActive?"active":""}" onclick="selectConv('${c.id}')">
        <div class="inbox-conv-avatar">👤</div>
        <div class="inbox-conv-info">
          <div class="inbox-conv-name">${esc(c.otherName||"Trader")}</div>
          <div class="inbox-conv-preview">${c.lastMsg?esc(c.lastMsg):"No messages yet"}</div>
        </div>
        ${unread>0?`<div class="inbox-unread-badge">${unread>9?"9+":unread}</div>`:""}
      </div>`;
    }).join("");
  }

  /* convId = tradeId + "_" + buyerUid */
  window.selectConv=async(convId)=>{
    activeConvId=convId;
    // Mark as read immediately
    await markRead(convId);
    // Get meta
    const snap=await get(ref(db,"inboxMeta/"+currentUser.uid+"/"+convId));
    if(!snap.exists())return;
    openConv({id:convId,...snap.val()});
    // Update sidebar active state
    document.querySelectorAll(".inbox-conv-item").forEach(el=>{
      el.classList.toggle("active",el.getAttribute("onclick")==="selectConv('"+convId+"')");
    });
  };

  async function markRead(convId){
    if(!currentUser||isGuest)return;
    try{await update(ref(db,"inboxMeta/"+currentUser.uid+"/"+convId),{unread:0});}catch(e){}
  }

  function openConv(meta){
    const area=document.getElementById("inboxConvArea");if(!area)return;
    area.innerHTML=`
      <div class="inbox-conv-head">
        <div class="inbox-conv-head-name">👤 ${esc(meta.otherName||"Trader")}</div>
        <div class="inbox-conv-head-sub">${meta.myRole==="poster"?"Interested in your trade listing":"Trade conversation"}</div>
      </div>
      <div class="inbox-messages" id="inboxMsgs"></div>
      <div class="inbox-input-row">
        <input id="inboxInput" class="chat-input" placeholder="Type a message..." onkeypress="onInboxKey(event)"/>
        <button class="btn-send" onclick="sendInboxMsg()">➤</button>
      </div>`;
    // Attach live message listener
    if(convMsgsListener){off(convMsgsListener);convMsgsListener=null;}
    const msgsRef=ref(db,"conversations/"+meta.id+"/messages");
    convMsgsListener=msgsRef;
    onValue(msgsRef,(snap)=>{
      const box=document.getElementById("inboxMsgs");if(!box)return;
      const msgs=[];
      if(snap.exists())snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
      msgs.sort((a,b)=>(a.ts||0)-(b.ts||0));
      if(!msgs.length){
        box.innerHTML=`<div style="text-align:center;color:var(--muted);padding:30px;font-size:0.85rem;font-weight:600;">No messages yet — say hi! 👋</div>`;
        return;
      }
      box.innerHTML=msgs.map(m=>{
        const me=m.uid===currentUser?.uid;
        return`<div class="msg ${me?"me":"other"}">
          <span class="msg-who">${me?"You":esc(m.name)}</span>
          <span class="msg-txt">${esc(m.text)}</span>
        </div>`;
      }).join("");
      requestAnimationFrame(()=>{box.scrollTop=box.scrollHeight;});
      // Auto-clear unread when user is actively viewing
      markRead(meta.id);
    });
    setTimeout(()=>document.getElementById("inboxInput")?.focus(),100);
  }

  window.sendInboxMsg=async()=>{
    if(!currentUser||!activeConvId)return;
    const inp=document.getElementById("inboxInput"),text=inp?.value.trim();
    if(!text)return;
    inp.value="";
    const now=Date.now();
    try{
      // Save message
      const mr=push(ref(db,"conversations/"+activeConvId+"/messages"));
      await set(mr,{uid:currentUser.uid,name:currentUser.displayName,text,ts:now});
      // Update my meta
      await update(ref(db,"inboxMeta/"+currentUser.uid+"/"+activeConvId),{lastMsg:text,lastTs:now});
      // Update other party's meta with unread increment
      const myMetaSnap=await get(ref(db,"inboxMeta/"+currentUser.uid+"/"+activeConvId));
      if(myMetaSnap.exists()){
        const otherUid=myMetaSnap.val().otherUid;
        if(otherUid){
          const otherRef=ref(db,"inboxMeta/"+otherUid+"/"+activeConvId);
          const otherSnap=await get(otherRef);
          const curUnread=otherSnap.exists()?(otherSnap.val().unread||0):0;
          await update(otherRef,{lastMsg:text,lastTs:now,unread:curUnread+1});
        }
      }
    }catch(e){console.error("[INBOX] Send failed:",e.message);}
  };

  window.onInboxKey=(e)=>{if(e.key==="Enter")window.sendInboxMsg();};

  /* Start conversation: called when user clicks "Message Trader" */
  window.startConversation=async(tradeId,posterUid,posterName)=>{
    if(!currentUser||isGuest){alert("Please sign in to message traders!");return;}
    if(currentUser.uid===posterUid){
      // Own trade — go to inquiries
      closeTradeDetail();
      goInbox(tradeId);
      return;
    }
    const convId=tradeId+"_"+currentUser.uid;
    const now=Date.now();
    try{
      // Create meta for buyer if not exists
      const myMetaRef=ref(db,"inboxMeta/"+currentUser.uid+"/"+convId);
      const mySnap=await get(myMetaRef);
      if(!mySnap.exists()){
        await set(myMetaRef,{convId,tradeId,otherUid:posterUid,otherName:posterName,myRole:"buyer",lastMsg:"",lastTs:now,unread:0});
      }
      // Create meta for poster if not exists
      const posterMetaRef=ref(db,"inboxMeta/"+posterUid+"/"+convId);
      const posterSnap=await get(posterMetaRef);
      if(!posterSnap.exists()){
        await set(posterMetaRef,{convId,tradeId,otherUid:currentUser.uid,otherName:currentUser.displayName,myRole:"poster",lastMsg:"",lastTs:now,unread:0});
      }
    }catch(e){console.error("[INBOX] Setup failed:",e.message);}
    closeTradeDetail();
    goInbox(null,convId);
  };

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     ROOMS (unchanged)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function listenRooms(dest){
    const r=ref(db,"rooms");roomsListener=r;
    onValue(r,(snap)=>{
      const now=Date.now(),rooms=[];
      if(snap.exists())snap.forEach(c=>{
        const rm={id:c.key,...c.val()};
        if(rm.expiresAt&&rm.expiresAt<now){remove(ref(db,"rooms/"+c.key));return;}
        if(rm.destination===dest)rooms.push(rm);
      });
      renderRoomList(rooms);
    });
  }

  function renderRoomList(rooms){
    const el=document.getElementById("roomList");if(!el)return;
    if(!rooms.length){el.innerHTML=`<div class="empty-msg">😴 No rooms yet!<br/>Hit <b>✨ Create Room</b> to start the hunt!</div>`;return;}
    el.innerHTML=rooms.map(r=>{
      const pl=r.players?Object.values(r.players):[],hb=pl.some(p=>p.hasBeastBoat===true),full=pl.length>=7;
      const rem=r.expiresAt?Math.max(0,r.expiresAt-Date.now()):0,m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
      return`<div class="room-card" onclick="enterRoom('${r.id}')">
        <div class="room-head"><span class="room-host">👑 ${r.host||"Unknown"}</span><span class="timer-pill">⏱ ${m}m ${s}s</span></div>
        <div class="room-stats"><span class="room-count ${full?"full":""}">👥 ${pl.length}/7 players</span>
        <span class="room-beast ${hb?"yes":"no"}">${hb?"🚢 Beast Hunter Available!":"❌ No Beast Hunter yet"}</span></div>
        <button class="btn-join ${full?"full":""}" onclick="event.stopPropagation();joinRoom('${r.id}')">${full?"Room Full 😔":"Join Room →"}</button>
      </div>`;
    }).join("");
  }

  window.createRoom=async()=>{
    if(!currentUser||!currentDestination)return;
    const btn=document.querySelector(".btn-create");
    if(btn){btn.disabled=true;btn.textContent="Creating... ✨";}
    const now=Date.now(),rid=push(ref(db,"rooms")).key;
    try{
      await set(ref(db,"rooms/"+rid),{destination:currentDestination,host:currentUser.displayName,hostUid:currentUser.uid,createdAt:now,expiresAt:now+3600000,
        players:{[currentUser.uid]:{uid:currentUser.uid,name:currentUser.displayName,hasBeastBoat:window._myBoat===true}}});
      enterRoom(rid);
    }catch(e){alert("❌ Couldn't create room!\n"+e.message);if(btn){btn.disabled=false;btn.textContent="✨ Create Room";}}
  };

  window.joinRoom=async(rid)=>{
    try{
      const snap=await get(ref(db,"rooms/"+rid));if(!snap.exists()){alert("Room no longer exists!");return;}
      const r=snap.val(),pl=r.players?Object.values(r.players):[];
      if(pl.length>=7){alert("😔 Room is full!");return;}
      if(r.players&&r.players[currentUser.uid]){enterRoom(rid);return;}
      await update(ref(db,"rooms/"+rid+"/players"),{[currentUser.uid]:{uid:currentUser.uid,name:currentUser.displayName,hasBeastBoat:window._myBoat===true}});
      enterRoom(rid);
    }catch(e){alert("Couldn't join room. Try again!");}
  };

  window.leaveRoom=async()=>{
    if(!currentRoom)return;
    try{
      await remove(ref(db,"rooms/"+currentRoom+"/players/"+currentUser.uid));
      const snap=await get(ref(db,"rooms/"+currentRoom+"/players"));
      if(!snap.exists()||!Object.keys(snap.val()||{}).length)await remove(ref(db,"rooms/"+currentRoom));
    }catch(e){}
    cleanupListeners();currentRoom=null;renderApp("destination");listenRooms(currentDestination);
  };

  window.enterRoom=(rid)=>{cleanupListeners();currentRoom=rid;renderApp("room");listenRoomDoc(rid);listenChat(rid);};

  function listenRoomDoc(rid){
    const r=ref(db,"rooms/"+rid);roomDocListener=r;
    let last=null;
    onValue(r,(snap)=>{
      if(!snap.exists()){goDestination(currentDestination);return;}
      const rm={id:rid,...snap.val()};
      if(rm.expiresAt&&rm.expiresAt<Date.now()){remove(r);goDestination(currentDestination);return;}
      last=rm;renderRoomView(rm);
    });
    if(roomTimerInterval)clearInterval(roomTimerInterval);
    roomTimerInterval=setInterval(()=>{
      if(!last)return;
      const pill=document.getElementById("roomTimerPill");if(!pill){clearInterval(roomTimerInterval);return;}
      const rem=last.expiresAt?Math.max(0,last.expiresAt-Date.now()):0;
      if(!rem){remove(ref(db,"rooms/"+rid));goDestination(currentDestination);return;}
      pill.textContent=`⏱ ${Math.floor(rem/60000)}:${String(Math.floor((rem%60000)/1000)).padStart(2,"0")}`;
    },1000);
  }

  function renderRoomView(r){
    const pl=r.players?Object.values(r.players):[],hb=pl.some(p=>p.hasBeastBoat===true);
    const rem=r.expiresAt?Math.max(0,r.expiresAt-Date.now()):0,m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
    const el=document.getElementById("roomContent");if(!el)return;
    el.innerHTML=`<div class="room-title-row"><h2 class="room-h2">📍 ${r.destination}</h2><span class="room-timer-pill" id="roomTimerPill">⏱ ${m}:${String(s).padStart(2,"0")}</span></div>
      <div class="beast-banner ${hb?"yes":"no"}">${hb?"🚢 BEAST HUNTER IS HERE!":"❌ No Beast Hunter yet — someone needs the boat!"}</div>
      <div class="player-grid">
        ${pl.map(p=>`<div class="p-chip ${p.uid===currentUser?.uid?"me":""}"><span class="p-name">${p.uid===currentUser?.uid?"⭐ You":p.name}</span><span class="p-boat ${p.hasBeastBoat?"yes":"no"}">${p.hasBeastBoat?"🚢":"🚫"}</span></div>`).join("")}
        ${Array(Math.max(0,7-pl.length)).fill(0).map(()=>`<div class="p-chip empty">Waiting...</div>`).join("")}
      </div>`;
  }

  function listenChat(rid){
    const r=ref(db,"chat/"+rid);chatListener=r;
    onValue(r,(snap)=>{
      const box=document.getElementById("chatBox");if(!box)return;
      const msgs=[];if(snap.exists())snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
      box.innerHTML=msgs.map(m=>{const me=m.uid===currentUser?.uid;
        return`<div class="msg ${me?"me":"other"}"><span class="msg-who">${me?"You":m.name}</span><span class="msg-txt">${esc(m.text)}</span></div>`;
      }).join("");
      box.scrollTop=box.scrollHeight;
    });
  }
  window.sendMessage=async()=>{
    const inp=document.getElementById("chatInput"),text=inp?.value.trim();
    if(!text||!currentRoom)return;inp.value="";
    try{const mr=push(ref(db,"chat/"+currentRoom));await set(mr,{uid:currentUser.uid,name:currentUser.displayName,text,ts:Date.now()});}catch(e){}
  };
  window.onChatKey=(e)=>{if(e.key==="Enter")window.sendMessage();};

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     FRUITS CACHE (with onReady callback)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function listenFruitsCache(onReady){
    const r=ref(db,"fruits");fruitsListener=r;
    onValue(r,(snap)=>{
      fruitsCache={};
      if(snap.exists())snap.forEach(c=>{fruitsCache[c.key]={id:c.key,...c.val()};});
      if(!fruitsCacheReady){fruitsCacheReady=true;if(onReady)onReady();}
      else applyFilterAndRender();
    });
  }

  /* ── FRUIT PICKER ── */
  window.openFruitPicker=(side,index)=>{pickerTarget={side,index,ctx:"trade"};buildPickerGrid();document.getElementById("fruitPickerModal").classList.add("show");};
  window.openFilterPicker=(side,index)=>{pickerTarget={side,index,ctx:"filter"};buildPickerGrid();document.getElementById("fruitPickerModal").classList.add("show");};

  function rarityClass(r){return(r+"").toLowerCase().replace(/\s/g,"");}

  function buildPickerGrid(){
    const grid=document.getElementById("fruitPickerGrid");
    const fruits=Object.values(fruitsCache).sort((a,b)=>({Mythical:0,Legendary:1,Rare:2,Uncommon:3,Common:4}[a.rarity]??5)-({Mythical:0,Legendary:1,Rare:2,Uncommon:3,Common:4}[b.rarity]??5));
    if(!fruits.length){grid.innerHTML=`<div class="no-fruits-msg">🍊 No fruits added yet.<br/>Admin needs to add fruits first.</div>`;return;}
    grid.innerHTML=fruits.map(f=>`
      <div class="fruit-picker-item fp-${rarityClass(f.rarity)}" onclick="selectFruitPicker('${f.id}')">
        <img src="${f.photo||''}" alt="${esc(f.name)}" onerror="this.style.opacity='0.3'"/>
        <div class="fp-name">${esc(f.name)}</div>
        <div><span class="rarity rarity-${f.rarity||'Common'}">${f.rarity||'Common'}</span></div>
      </div>`).join("");
  }

  window.selectFruitPicker=(id)=>{
    if(!pickerTarget)return;
    const{side,index,ctx}=pickerTarget;
    if(ctx==="filter"){if(side==="want")filterWants[index]=id;else filterOffers[index]=id;closeFruitPicker();renderFilterSlots();}
    else{if(side==="want")tradeWants[index]=id;else tradeOffers[index]=id;closeFruitPicker();renderTradeSlots();}
  };
  window.closeFruitPicker=()=>{document.getElementById("fruitPickerModal").classList.remove("show");pickerTarget=null;};
  window.removeFromTrade=(side,idx)=>{if(side==="want")tradeWants[idx]=null;else tradeOffers[idx]=null;renderTradeSlots();};

  function renderTradeSlots(){
    ["want","offer"].forEach(side=>{
      const arr=side==="want"?tradeWants:tradeOffers;
      for(let i=0;i<4;i++){
        const el=document.getElementById(`slot-${side}-${i}`);if(!el)continue;
        const id=arr[i];
        if(id&&fruitsCache[id]){
          const f=fruitsCache[id],rc=rarityClass(f.rarity);
          el.className=`fruit-slot filled rarity-${rc}`;
          el.innerHTML=`<img src="${f.photo||''}" alt="${esc(f.name)}" onerror="this.style.opacity='0.3'"/>
            <span class="slot-name">${esc(f.name)}</span>
            <span class="remove-slot" onclick="event.stopPropagation();removeFromTrade('${side}',${i})">✕</span>`;
          el.onclick=null;
        }else{
          el.className="fruit-slot";
          el.innerHTML=`<span class="plus-icon">+</span>`;
          el.onclick=()=>openFruitPicker(side,i);
        }
      }
    });
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     TRADE SYSTEM
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function listenTrades(){
    const r=ref(db,"trades");tradesListener=r;
    onValue(r,(snap)=>{
      allTradesCache=[];
      if(snap.exists())snap.forEach(c=>allTradesCache.push({id:c.key,...c.val()}));
      allTradesCache.sort((a,b)=>(b.ts||0)-(a.ts||0));
      if(allTradesCache.length>50)allTradesCache=allTradesCache.slice(0,50);
      applyFilterAndRender();
    });
  }

  function applyFilterAndRender(){
    const wf=filterWants.filter(Boolean),of_=filterOffers.filter(Boolean);
    if(!filterActive||(wf.length===0&&of_.length===0)){renderTradeList(allTradesCache);return;}
    renderTradeList(allTradesCache.filter(t=>{
      const wi=t.wants?Object.values(t.wants):[],oi=t.offers?Object.values(t.offers):[];
      return wf.every(id=>wi.includes(id))&&of_.every(id=>oi.includes(id));
    }));
  }

  window.postTrade=async()=>{
    if(!currentUser){alert("Please sign in to post a trade!");return;}
    const wl=tradeWants.filter(Boolean),ol=tradeOffers.filter(Boolean);
    if(!wl.length&&!ol.length){alert("Please add at least one fruit to either side!");return;}
    const btn=document.getElementById("postTradeBtn");if(btn)btn.disabled=true;
    try{
      const tid=push(ref(db,"trades")).key,wo={},oo={};
      wl.forEach((id,i)=>wo[i]=id);ol.forEach((id,i)=>oo[i]=id);
      await set(ref(db,"trades/"+tid),{uid:currentUser.uid,name:currentUser.displayName,wants:wo,offers:oo,ts:Date.now(),status:"open"});
      tradeWants=[null,null,null,null];tradeOffers=[null,null,null,null];renderTradeSlots();
    }catch(e){alert("Couldn't post trade. Try again!");}
    if(btn)btn.disabled=false;
  };

  window.deleteTrade=async(tid)=>{if(!confirm("Delete this trade?"))return;try{await remove(ref(db,"trades/"+tid));}catch(e){}};

  function renderTradeList(trades){
    const el=document.getElementById("tradeList");if(!el)return;
    if(!trades.length){
      el.innerHTML=`<div class="empty-msg" style="grid-column:1/-1;">${filterActive?"🔍 No trades match your filter.":"🤝 No trades posted yet!"}</div>`;
      return;
    }
    /* Build ALL HTML at once then assign — prevents partial renders / overlap */
    el.innerHTML=trades.map(t=>{
      const wi=t.wants?Object.values(t.wants):[],oi=t.offers?Object.values(t.offers):[];
      const isOwn=currentUser&&t.uid===currentUser.uid;
      const canDel=currentUser&&(isOwn||isAdmin());
      return`<div class="trade-card" onclick="openTradeDetail('${t.id}')">
        <div class="trade-card-top">
          <span class="trade-poster">👤 ${esc(t.name)}${isOwn?` <span style="opacity:0.5;font-size:0.65rem">(you)</span>`:""}</span>
        </div>
        <div class="trade-card-body">
          <div><div class="trade-side-tag want">Wants</div><div class="card-fruit-grid">${cardFruitGrid(wi)}</div></div>
          <div class="trade-arrow">⇄</div>
          <div><div class="trade-side-tag offer">Offers</div><div class="card-fruit-grid">${cardFruitGrid(oi)}</div></div>
        </div>
        <div class="trade-card-footer">
          <span class="trade-card-age">🕐 ${getTimeAgo(t.ts)}</span>
          ${canDel?`<button class="btn-delete-trade" onclick="event.stopPropagation();deleteTrade('${t.id}')">🗑 Remove</button>`
                  :`<span style="font-size:0.7rem;color:rgba(176,110,243,0.5);font-weight:700;">tap to message →</span>`}
        </div>
      </div>`;
    }).join("");
  }

  function cardFruitGrid(ids){
    return[0,1,2,3].map(i=>{
      const fid=ids[i];if(!fid)return`<div class="card-fruit-empty"></div>`;
      const f=fruitsCache[fid];if(!f)return`<div class="card-fruit-tile"><span style="font-size:0.6rem;color:var(--muted)">?</span></div>`;
      const rc=rarityClass(f.rarity);
      return`<div class="card-fruit-tile rarity-${rc}">
        <img src="${f.photo||''}" alt="${esc(f.name)}" onerror="this.style.opacity='0.3'"/>
        <span class="cft-name">${esc(f.name)}</span>
        <span class="rarity-pill rarity-${rc}">${f.rarity||"?"}</span>
      </div>`;
    }).join("");
  }

  /* Trade detail modal — no public chat */
  window.openTradeDetail=async(tradeId)=>{
    try{
      const snap=await get(ref(db,"trades/"+tradeId));
      if(!snap.exists()){alert("This trade no longer exists!");return;}
      const t={id:tradeId,...snap.val()};
      const wi=t.wants?Object.values(t.wants):[],oi=t.offers?Object.values(t.offers):[];
      const isOwn=currentUser&&t.uid===currentUser.uid;
      const canDel=currentUser&&(isOwn||isAdmin());

      const mkFruits=ids=>ids.length>0
        ?ids.map(id=>{
          const f=fruitsCache[id];if(!f)return`<div class="trade-detail-fruit"><span style="font-size:0.78rem;color:var(--muted)">Unknown Fruit</span></div>`;
          const rc=rarityClass(f.rarity);
          return`<div class="trade-detail-fruit"><img src="${f.photo||''}" alt="${esc(f.name)}" onerror="this.style.opacity='0.3'"/>
            <div><div class="tdf-name">${esc(f.name)}</div><div class="tdf-val"><span class="rarity-pill rarity-${rc}">${f.rarity||"?"}</span></div></div></div>`;
        }).join("")
        :`<div style="color:var(--muted);font-size:0.82rem;font-weight:600;padding:8px 0;">Anything / Negotiable</div>`;

      document.getElementById("tradeDetailBody").innerHTML=`
        <div class="trade-detail-poster">
          <div class="trade-detail-avatar">👤</div>
          <div><div class="trade-detail-name">${esc(t.name)}</div><div class="trade-detail-time">Posted ${getTimeAgo(t.ts)}</div></div>
        </div>
        <div class="trade-detail-sections">
          <div class="trade-detail-section"><h4 class="want">🔵 WANTS</h4><div class="trade-detail-fruits">${mkFruits(wi)}</div></div>
          <div class="trade-detail-section"><h4 class="offer">🟢 OFFERS</h4><div class="trade-detail-fruits">${mkFruits(oi)}</div></div>
        </div>
        <div class="trade-detail-actions">
          ${isOwn
            ?`<button class="btn-view-inquiries" onclick="closeTradeDetail();goInbox('${t.id}')">📬 View Inquiries in Inbox</button>`
            :(currentUser&&!isGuest
              ?`<button class="btn-msg-trader" onclick="startConversation('${t.id}','${t.uid}','${esc(t.name)}')">💬 Message ${esc(t.name)}</button>`
              :`<p style="text-align:center;color:var(--muted);font-size:0.85rem;font-weight:600;">🔒 Sign in to message this trader</p>`
            )
          }
          ${canDel?`<button class="btn-delete-trade" onclick="deleteTrade('${t.id}');closeTradeDetail()">🗑 Remove This Listing</button>`:""}
        </div>`;
      document.getElementById("tradeDetailModal").classList.add("show");
    }catch(e){alert("Couldn't load trade details. Try again!");}
  };

  window.closeTradeDetail=()=>document.getElementById("tradeDetailModal").classList.remove("show");

  /* ── FILTER ── */
  window.openFilterModal=()=>{renderFilterSlots();document.getElementById("filterModal").classList.add("show");};
  window.closeFilterModal=()=>document.getElementById("filterModal").classList.remove("show");

  function renderFilterSlots(){
    ["want","offer"].forEach(side=>{
      const arr=side==="want"?filterWants:filterOffers;
      for(let i=0;i<4;i++){
        const el=document.getElementById(`fslot-${side}-${i}`);if(!el)continue;
        const id=arr[i];
        if(id&&fruitsCache[id]){
          const f=fruitsCache[id],rc=rarityClass(f.rarity);
          el.className=`filter-slot filled rarity-${rc}`;
          el.innerHTML=`<img src="${f.photo||''}" alt="${esc(f.name)}" onerror="this.style.opacity='0.3'"/>
            <span class="slot-name">${esc(f.name)}</span>
            <span class="remove-slot" onclick="event.stopPropagation();removeFromFilter('${side}',${i})">✕</span>`;
          el.onclick=null;
        }else{
          el.className="filter-slot";el.innerHTML=`<span class="plus-icon">+</span>`;el.onclick=()=>openFilterPicker(side,i);
        }
      }
    });
  }

  window.removeFromFilter=(side,idx)=>{if(side==="want")filterWants[idx]=null;else filterOffers[idx]=null;renderFilterSlots();};

  window.applyFilter=()=>{
    filterActive=true;closeFilterModal();
    const wf=filterWants.filter(Boolean),of_=filterOffers.filter(Boolean);
    const banner=document.getElementById("filterActiveBanner"),btn=document.getElementById("filterBtn");
    if(!wf.length&&!of_.length){filterActive=false;if(banner)banner.classList.remove("show");if(btn)btn.classList.remove("active");}
    else{
      const names=[...wf,...of_].map(id=>fruitsCache[id]?.name||"?").join(", ");
      if(banner){banner.textContent=`🔍 Filter: ${names}`;banner.classList.add("show");}
      if(btn)btn.classList.add("active");
    }
    applyFilterAndRender();
  };

  window.clearFilter=()=>{
    filterWants=[null,null,null,null];filterOffers=[null,null,null,null];filterActive=false;
    closeFilterModal();
    const banner=document.getElementById("filterActiveBanner"),btn=document.getElementById("filterBtn");
    if(banner)banner.classList.remove("show");if(btn)btn.classList.remove("active");
    renderFilterSlots();applyFilterAndRender();
  };

  function getTimeAgo(ts){if(!ts)return"";const d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return"Just now";if(m<60)return`${m}m ago`;const h=Math.floor(m/60);if(h<24)return`${h}h ago`;return`${Math.floor(h/24)}d ago`;}

  /* ── ADMIN ── */
  function listenFruitsAdmin(){
    const r=ref(db,"fruits");fruitsListener=r;
    onValue(r,(snap)=>{
      fruitsCache={};const fruits=[];
      if(snap.exists())snap.forEach(c=>{const f={id:c.key,...c.val()};fruitsCache[c.key]=f;fruits.push(f);});
      renderAdminFruitList(fruits);
    });
  }

  window.addFruit=async()=>{
    if(!isAdmin())return;
    const name=document.getElementById("fn-name")?.value.trim();
    const value=document.getElementById("fn-value")?.value.trim();
    const photo=document.getElementById("fn-photo")?.value.trim();
    const rarity=document.getElementById("fn-rarity")?.value;
    const type=document.getElementById("fn-type")?.value;
    if(!name||!value||!photo||!rarity||!type){alert("Please fill in all fields!");return;}
    const btn=document.getElementById("addFruitBtn");if(btn)btn.disabled=true;
    try{
      const fid=push(ref(db,"fruits")).key;
      await set(ref(db,"fruits/"+fid),{name,value:Number(value),photo,rarity,type,addedAt:Date.now()});
      document.getElementById("fn-name").value="";
      document.getElementById("fn-value").value="";
      document.getElementById("fn-photo").value="";
    }catch(e){alert("Failed: "+e.message);}
    if(btn)btn.disabled=false;
  };

  window.deleteFruit=async(id)=>{if(!isAdmin()||!confirm("Delete this fruit?"))return;try{await remove(ref(db,"fruits/"+id));}catch(e){}};
