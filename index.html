<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RentAFruit — Leviathan Hunt & Trading</title>
<meta name="description" content="RentAFruit is a free community matchmaking tool for Blox Fruits players. Find Leviathan Hunt rooms and trade Devil Fruits and Game Passes with other players."/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#07071a;--card:#0e0e28;--purple:#b06ef3;--purple2:#7c3aed;--blue:#4f9ef8;--blue2:#22d3ee;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;--text:#eef2ff;--muted:#8b9bb4;--border:rgba(176,110,243,0.18);--gp:0 0 24px rgba(176,110,243,0.45);--gb:0 0 24px rgba(79,158,248,0.45);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(176,110,243,0.1) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(79,158,248,0.08) 0%,transparent 55%);pointer-events:none;z-index:0;}
  #app{position:relative;z-index:1;min-height:100vh;}

  /* LOADER */
  .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;}
  .loader-fruit{font-size:52px;animation:bounce 1s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .loader-text{font-size:1rem;font-weight:700;color:var(--purple);letter-spacing:2px;}
  .loader-sub{font-size:0.75rem;font-weight:600;color:var(--muted);letter-spacing:1px;}
  .loader-bar-wrap{width:220px;height:6px;background:rgba(176,110,243,0.15);border-radius:99px;overflow:hidden;border:1px solid rgba(176,110,243,0.2);}
  .loader-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--purple2),var(--purple),var(--blue2));border-radius:99px;transition:width 0.4s ease;box-shadow:0 0 10px rgba(176,110,243,0.6);}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-glow{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(176,110,243,0.13) 0%,transparent 65%);animation:breathe 4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:1}50%{opacity:0.5}}
  .login-box{position:relative;background:rgba(14,14,40,0.97);border:1.5px solid var(--border);border-radius:24px;padding:48px 40px;max-width:430px;width:100%;text-align:center;box-shadow:var(--gp),0 32px 64px rgba(0,0,0,0.55);animation:floatin 0.5s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes floatin{from{opacity:0;transform:translateY(24px) scale(0.96)}to{opacity:1;transform:none}}
  .login-fruit{font-size:68px;display:block;filter:drop-shadow(0 0 20px rgba(176,110,243,0.9));margin-bottom:10px;}
  .login-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;background:linear-gradient(130deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .login-sub{font-size:0.7rem;letter-spacing:4px;color:var(--muted);font-weight:700;margin-top:4px;}
  .login-desc{margin:18px 0 26px;color:var(--muted);font-size:1.02rem;line-height:1.6;}
  .divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .divider span{font-size:0.78rem;color:var(--muted);font-weight:700;}
  .btn-google{display:flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:14px 20px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.13);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.22s;}
  .btn-google:hover{background:rgba(255,255,255,0.11);transform:translateY(-2px);}
  .btn-google:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .btn-guest{display:flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:13px 20px;margin-top:10px;background:rgba(176,110,243,0.1);border:1.5px solid rgba(176,110,243,0.3);border-radius:12px;color:var(--purple);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.22s;}
  .btn-guest:hover{background:rgba(176,110,243,0.18);transform:translateY(-2px);}
  .login-err{margin-top:14px;padding:10px 14px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:9px;color:var(--red);font-size:0.85rem;display:none;}

  /* GUEST MODAL */
  .guest-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:999;align-items:center;justify-content:center;}
  .guest-modal.show{display:flex;}
  .guest-box{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:36px 32px;max-width:360px;width:92%;text-align:center;box-shadow:var(--gp);animation:floatin 0.35s ease;}
  .guest-box h3{font-size:1.4rem;font-weight:800;margin-bottom:6px;}
  .guest-box p{color:var(--muted);font-size:0.95rem;margin-bottom:20px;}
  .name-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;outline:none;transition:border-color 0.2s;margin-bottom:14px;}
  .name-input:focus{border-color:var(--purple);}
  .name-input::placeholder{color:var(--muted);}
  .btn-enter{width:100%;padding:13px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:11px;color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .btn-enter:hover{transform:translateY(-2px);}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;background:rgba(7,7,26,0.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .topbar-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1rem;background:linear-gradient(90deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;letter-spacing:1px;user-select:none;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--purple);object-fit:cover;}
  .uname{font-size:0.88rem;font-weight:700;color:var(--muted);display:none;}
  @media(min-width:480px){.uname{display:block;}}
  .btn-sm{padding:6px 13px;background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn-sm:hover{border-color:var(--purple);color:var(--purple);}

  /* NAVBAR */
  .navbar{display:flex;align-items:center;gap:4px;padding:8px 22px;background:rgba(7,7,26,0.88);border-bottom:1px solid rgba(176,110,243,0.1);overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;}
  .navbar::-webkit-scrollbar{display:none;}
  .nav-link{padding:6px 14px;border-radius:20px;font-size:0.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;border:1.5px solid transparent;position:relative;}
  .nav-link:hover{color:var(--text);background:rgba(176,110,243,0.1);}
  .nav-link.active{color:var(--purple);background:rgba(176,110,243,0.12);border-color:rgba(176,110,243,0.3);}
  .nav-link.admin{color:var(--yellow);}
  .nav-link.admin:hover{background:rgba(251,191,36,0.1);}
  .nav-link.admin.active{background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.4);}
  /* Unread badge on inbox nav */
  .nav-unread{position:absolute;top:1px;right:2px;background:var(--red);color:#fff;border-radius:99px;font-size:0.58rem;font-weight:900;padding:1px 5px;min-width:16px;text-align:center;line-height:1.6;display:none;}
  .nav-unread.show{display:block;}

  /* MAIN */
  .main{max-width:1080px;margin:0 auto;padding:26px 18px;}

  /* PROFILE */
  .profile-panel{background:rgba(176,110,243,0.06);border:1.5px solid var(--border);border-radius:18px;padding:16px 20px;margin-bottom:30px;}
  .profile-inner{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .profile-avatar{width:50px;height:50px;border-radius:50%;border:2px solid var(--purple);object-fit:cover;box-shadow:0 0 12px rgba(176,110,243,0.4);}
  .profile-name{font-size:1rem;font-weight:800;color:var(--purple);}
  .profile-badge{font-size:0.75rem;color:var(--muted);font-weight:600;margin-top:2px;}
  .boat-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .boat-label{font-size:0.9rem;font-weight:700;color:var(--text);}
  .toggle-wrap{display:flex;align-items:center;gap:8px;}
  .switch{position:relative;display:inline-block;width:52px;height:28px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.15);border-radius:28px;transition:0.3s;}
  .slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:0.3s;}
  input:checked+.slider{background:rgba(52,211,153,0.25);border-color:var(--green);}
  input:checked+.slider::before{transform:translateX(24px);background:var(--green);box-shadow:0 0 10px var(--green);}
  .boat-indicator{display:flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:800;padding:5px 12px;border-radius:20px;transition:all 0.3s;}
  .boat-indicator.on{background:rgba(52,211,153,0.15);color:var(--green);border:1.5px solid rgba(52,211,153,0.35);}
  .boat-indicator.off{background:rgba(248,113,113,0.12);color:var(--red);border:1.5px solid rgba(248,113,113,0.3);}
  .dot{width:8px;height:8px;border-radius:50%;}
  .dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite;}
  .dot.off{background:var(--red);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

  /* HERO */
  .hero{text-align:center;margin-bottom:36px;}
  .hero-eye{font-size:0.72rem;letter-spacing:5px;color:var(--muted);font-weight:700;margin-bottom:8px;}
  .hero-h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,4vw,2.4rem);font-weight:900;line-height:1.25;}
  .grad{background:linear-gradient(90deg,var(--purple),var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hero-tip{margin-top:10px;font-size:0.9rem;color:var(--muted);font-weight:600;}

  /* DEST CARDS */
  .dest-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;}
  .dest-card{position:relative;overflow:hidden;background:rgba(14,14,40,0.9);border:1.5px solid var(--border);border-radius:20px;padding:38px 26px;text-align:center;cursor:pointer;transition:all 0.28s ease;animation:floatin 0.45s ease both;}
  .dest-card:hover{transform:translateY(-7px);border-color:var(--purple);box-shadow:var(--gp),0 20px 40px rgba(0,0,0,0.4);}
  .dest-card:nth-child(2):hover{border-color:var(--blue);box-shadow:var(--gb),0 20px 40px rgba(0,0,0,0.4);}
  .dest-glow{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(176,110,243,0.12),transparent 70%);pointer-events:none;}
  .dest-glow.b{background:radial-gradient(circle,rgba(79,158,248,0.12),transparent 70%);}
  .dest-icon{font-size:58px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 14px rgba(176,110,243,0.7));}
  .dest-name{font-size:1.2rem;font-weight:900;margin-bottom:6px;}
  .dest-desc{font-size:0.85rem;color:var(--muted);margin-bottom:16px;font-weight:600;}
  .dest-cta{font-size:0.88rem;font-weight:800;color:var(--purple);display:flex;align-items:center;justify-content:center;gap:6px;}
  .dest-card:nth-child(2) .dest-cta{color:var(--blue);}

  /* PAGE HEADER */
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
  .page-title{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:900;color:var(--purple);letter-spacing:1px;}
  .btn-back{padding:8px 14px;background:transparent;border:1.5px solid var(--border);border-radius:9px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn-back:hover{border-color:var(--purple);color:var(--purple);}
  .btn-create{padding:10px 20px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.25s;box-shadow:0 0 18px rgba(176,110,243,0.4);}
  .btn-create:hover{transform:translateY(-2px);}
  .btn-create:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

  /* ROOM */
  .room-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:15px;min-height:120px;}
  .room-card{background:rgba(14,14,40,0.94);border:1.5px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:all 0.25s;animation:floatin 0.35s ease both;}
  .room-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:var(--gb);}
  .room-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .room-host{font-size:0.95rem;font-weight:800;}
  .timer-pill{font-size:0.7rem;font-weight:800;color:var(--blue2);background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.3);padding:3px 9px;border-radius:20px;}
  .room-stats{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
  .room-count{font-size:0.85rem;color:var(--muted);font-weight:600;}
  .room-count.full{color:var(--red);font-weight:800;}
  .room-beast{font-size:0.82rem;font-weight:800;}
  .room-beast.yes{color:var(--green);}
  .room-beast.no{color:var(--red);}
  .btn-join{width:100%;padding:9px;background:linear-gradient(90deg,var(--blue2),var(--blue));border:none;border-radius:9px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.18s;}
  .btn-join:hover{opacity:0.85;transform:translateY(-1px);}
  .btn-join.full{background:rgba(255,255,255,0.07);color:var(--muted);cursor:not-allowed;transform:none;}
  .empty-msg{grid-column:1/-1;text-align:center;color:var(--muted);padding:55px 20px;border:1.5px dashed var(--border);border-radius:16px;font-size:0.95rem;font-weight:600;}
  .room-layout{display:grid;grid-template-columns:1fr;gap:18px;}
  @media(min-width:768px){.room-layout{grid-template-columns:1fr 360px;align-items:start;}}
  .room-title-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
  .room-h2{font-family:'Orbitron',sans-serif;font-size:1.25rem;font-weight:900;color:var(--purple);text-shadow:0 0 16px rgba(176,110,243,0.65);}
  .room-timer-pill{font-size:0.82rem;font-weight:800;color:var(--blue2);background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.3);padding:6px 14px;border-radius:20px;}
  .beast-banner{padding:11px 16px;border-radius:11px;font-size:0.85rem;font-weight:800;letter-spacing:1px;text-align:center;margin-bottom:16px;}
  .beast-banner.yes{background:rgba(52,211,153,0.1);border:1.5px solid rgba(52,211,153,0.4);color:var(--green);}
  .beast-banner.no{background:rgba(248,113,113,0.1);border:1.5px solid rgba(248,113,113,0.35);color:var(--red);}
  .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;}
  .p-chip{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;padding:9px 11px;font-size:0.84rem;font-weight:700;}
  .p-chip.me{border-color:var(--purple);background:rgba(176,110,243,0.09);}
  .p-chip.empty{border-style:dashed;color:rgba(255,255,255,0.18);font-size:0.78rem;justify-content:center;font-weight:600;}
  .p-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .p-boat{font-size:0.95rem;flex-shrink:0;}
  .p-boat.yes{filter:drop-shadow(0 0 5px rgba(52,211,153,0.9));}
  .p-boat.no{opacity:0.3;}

  /* CHAT (room) */
  .chat-panel{background:rgba(14,14,40,0.95);border:1.5px solid var(--border);border-radius:18px;display:flex;flex-direction:column;height:490px;}
  .chat-head{padding:13px 16px;font-size:0.88rem;font-weight:800;color:var(--purple);border-bottom:1px solid var(--border);flex-shrink:0;}
  .chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(176,110,243,0.35) transparent;}
  .msg{display:flex;flex-direction:column;gap:3px;max-width:86%;}
  .msg.me{align-self:flex-end;align-items:flex-end;}
  .msg.other{align-self:flex-start;align-items:flex-start;}
  .msg-who{font-size:0.68rem;color:var(--muted);font-weight:700;margin:0 4px;}
  .msg-txt{padding:8px 13px;border-radius:12px;font-size:0.9rem;line-height:1.45;word-break:break-word;font-weight:600;}
  .msg.me .msg-txt{background:linear-gradient(130deg,var(--purple2),var(--purple));color:#fff;}
  .msg.other .msg-txt{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.07);}
  .chat-foot{display:flex;gap:8px;padding:11px;border-top:1px solid var(--border);flex-shrink:0;}
  .chat-input{flex:1;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.93rem;font-weight:600;outline:none;transition:border-color 0.2s;}
  .chat-input:focus{border-color:var(--purple);}
  .chat-input::placeholder{color:var(--muted);}
  .btn-send{padding:9px 15px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:10px;color:#fff;font-size:1rem;cursor:pointer;transition:all 0.18s;}
  .btn-send:hover{opacity:0.85;transform:scale(1.06);}

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     TRADE PAGE
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .section-title{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--purple);letter-spacing:1.5px;margin-bottom:6px;}
  .section-desc{color:var(--muted);font-size:0.88rem;line-height:1.7;font-weight:600;margin-bottom:18px;}

  .trade-form-box{background:rgba(14,14,40,0.92);border:1.5px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:22px;max-width:680px;margin-left:auto;margin-right:auto;}
  .trade-form-title{font-size:0.88rem;font-weight:800;color:var(--muted);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;}
  .trade-sides{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:520px){.trade-sides{grid-template-columns:1fr;gap:10px;}}
  .trade-side-label{font-size:0.72rem;font-weight:800;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase;}
  .trade-side-label.want{color:var(--blue2);}
  .trade-side-label.offer{color:var(--green);}
  .fruit-slots{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .fruit-slot{background:rgba(255,255,255,0.03);border:1.5px dashed rgba(255,255,255,0.1);border-radius:10px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.22s;position:relative;overflow:hidden;gap:3px;}
  .fruit-slot:hover{border-color:var(--purple);background:rgba(176,110,243,0.08);transform:scale(1.04);}
  .fruit-slot .plus-icon{font-size:1.6rem;color:rgba(176,110,243,0.5);line-height:1;transition:all 0.2s;}
  .fruit-slot:hover .plus-icon{color:var(--purple);transform:scale(1.15);}
  .fruit-slot.filled{border-style:solid;border-color:rgba(176,110,243,0.4);background:rgba(176,110,243,0.06);}
  .fruit-slot img{width:46px;height:46px;object-fit:contain;display:block;}
  .fruit-slot .slot-name{font-size:0.62rem;font-weight:800;color:var(--text);text-align:center;line-height:1.2;}
  .fruit-slot .remove-slot{position:absolute;top:4px;right:4px;font-size:0.6rem;color:var(--red);cursor:pointer;background:rgba(248,113,113,0.15);border-radius:4px;padding:1px 4px;line-height:1.4;}
  .btn-post{width:100%;padding:11px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.22s;box-shadow:0 0 16px rgba(176,110,243,0.3);}
  .btn-post:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(176,110,243,0.6);}
  .btn-post:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .trade-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}

  /* ─── FIX: trade card grid — NO transform animation to prevent overlap ─── */
  .trade-list{
    display:grid;
    /* 3 per row on wide, 2 on medium, 1 on mobile */
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
    align-items:start;   /* critical: cards don't stretch to match tallest */
  }
  @media(max-width:900px){.trade-list{grid-template-columns:repeat(2,minmax(0,1fr));}}
  @media(max-width:560px){.trade-list{grid-template-columns:minmax(0,1fr);}}

  /* ─── FIX: use opacity-only fade — NO transform — prevents visual overlap ─── */
  @keyframes fadein{from{opacity:0}to{opacity:1}}

  .trade-card{
    background:rgba(12,12,32,0.97);
    border:1.5px solid rgba(176,110,243,0.15);
    border-radius:16px;
    padding:14px;
    cursor:pointer;
    /* opacity fade only — no transform — cards stay in their grid cell */
    animation:fadein 0.3s ease both;
    display:flex;
    flex-direction:column;
    gap:10px;
    /* position:relative ensures stacking context stays within grid cell */
    position:relative;
    transition:border-color 0.25s, box-shadow 0.25s;
  }
  .trade-card:hover{border-color:rgba(176,110,243,0.5);box-shadow:0 6px 24px rgba(176,110,243,0.18);}

  .trade-card-top{display:flex;justify-content:space-between;align-items:center;}
  .trade-poster{font-size:0.8rem;font-weight:800;color:var(--purple);letter-spacing:0.3px;}
  .trade-card-body{display:grid;grid-template-columns:1fr 18px 1fr;align-items:start;gap:6px;}
  .trade-side-tag{font-size:0.62rem;font-weight:900;letter-spacing:1.5px;margin-bottom:6px;text-transform:uppercase;}
  .trade-side-tag.want{color:var(--blue2);}
  .trade-side-tag.offer{color:var(--green);}
  .trade-arrow{font-size:1rem;color:rgba(255,255,255,0.2);text-align:center;padding-top:22px;}
  .card-fruit-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
  .card-fruit-tile{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:6px 5px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;overflow:hidden;}
  .card-fruit-tile img{width:40px;height:40px;object-fit:contain;display:block;}
  .card-fruit-tile .cft-name{font-size:0.6rem;font-weight:800;color:var(--text);text-align:center;line-height:1.2;}
  .card-fruit-empty{background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.07);border-radius:9px;display:flex;align-items:center;justify-content:center;min-height:58px;}
  .card-fruit-tile.rarity-common{border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.05);}
  .card-fruit-tile.rarity-uncommon{border-color:rgba(52,211,153,0.4);background:rgba(52,211,153,0.07);}
  .card-fruit-tile.rarity-rare{border-color:rgba(79,158,248,0.45);background:rgba(79,158,248,0.07);}
  .card-fruit-tile.rarity-legendary{border-color:rgba(176,110,243,0.5);background:rgba(176,110,243,0.08);}
  .card-fruit-tile.rarity-mythical{border-color:rgba(251,146,60,0.55);background:rgba(251,146,60,0.08);}
  .rarity-pill{font-size:0.55rem;font-weight:900;letter-spacing:0.8px;padding:1px 5px;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
  .rarity-pill.rarity-common{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3);}
  .rarity-pill.rarity-uncommon{background:rgba(52,211,153,0.18);color:#6ee7b7;border:1px solid rgba(52,211,153,0.35);}
  .rarity-pill.rarity-rare{background:rgba(79,158,248,0.15);color:var(--blue);border:1px solid rgba(79,158,248,0.35);}
  .rarity-pill.rarity-legendary{background:rgba(176,110,243,0.15);color:var(--purple);border:1px solid rgba(176,110,243,0.35);}
  .rarity-pill.rarity-mythical{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.4);}
  .rarity{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.62rem;font-weight:800;letter-spacing:1px;}
  .rarity-Common{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3);}
  .rarity-Uncommon{background:rgba(52,211,153,0.18);color:#6ee7b7;border:1px solid rgba(52,211,153,0.35);}
  .rarity-Rare{background:rgba(79,158,248,0.15);color:var(--blue);border:1px solid rgba(79,158,248,0.35);}
  .rarity-Legendary{background:rgba(176,110,243,0.15);color:var(--purple);border:1px solid rgba(176,110,243,0.35);}
  .rarity-Mythical{background:rgba(251,146,60,0.15);color:var(--orange);border:1px solid rgba(251,146,60,0.4);}
  .trade-card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.05);}
  .trade-card-age{font-size:0.68rem;color:var(--muted);font-weight:600;}
  .btn-delete-trade{padding:5px 10px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);border-radius:7px;color:var(--red);font-family:'Nunito',sans-serif;font-size:0.7rem;font-weight:800;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
  .btn-delete-trade:hover{background:rgba(248,113,113,0.2);}
  .btn-filter{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;background:rgba(34,211,238,0.08);border:1.5px solid rgba(34,211,238,0.28);border-radius:10px;color:var(--blue2);font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .btn-filter:hover{background:rgba(34,211,238,0.15);transform:translateY(-1px);}
  .btn-filter.active{background:rgba(34,211,238,0.18);border-color:var(--blue2);}
  .filter-active-banner{padding:8px 14px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.25);border-radius:9px;font-size:0.78rem;font-weight:700;color:var(--blue2);margin-bottom:10px;display:none;}
  .filter-active-banner.show{display:block;}

  /* FILTER MODAL */
  .filter-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);z-index:996;align-items:center;justify-content:center;padding:20px;}
  .filter-modal.show{display:flex;}
  .filter-box{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:22px;max-width:560px;width:100%;box-shadow:var(--gp);animation:floatin 0.3s ease;}
  .filter-box h3{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:4px;}
  .filter-box p{font-size:0.78rem;color:var(--muted);font-weight:600;margin-bottom:16px;}
  .filter-sides{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
  @media(max-width:480px){.filter-sides{grid-template-columns:1fr;}}
  .filter-side-label{font-size:0.7rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  .filter-side-label.want{color:var(--blue2);}
  .filter-side-label.offer{color:var(--green);}
  .filter-slots{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .filter-slot{background:rgba(255,255,255,0.03);border:1.5px dashed rgba(255,255,255,0.1);border-radius:9px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all 0.2s;}
  .filter-slot:hover{border-color:var(--blue2);background:rgba(34,211,238,0.07);}
  .filter-slot .plus-icon{font-size:1.4rem;color:rgba(34,211,238,0.45);transition:all 0.2s;}
  .filter-slot:hover .plus-icon{color:var(--blue2);transform:scale(1.12);}
  .filter-slot.filled{border-style:solid;border-color:rgba(34,211,238,0.4);background:rgba(34,211,238,0.06);}
  .filter-slot img{width:38px;height:38px;object-fit:contain;}
  .filter-slot .slot-name{font-size:0.58rem;font-weight:800;color:var(--text);text-align:center;}
  .filter-slot .remove-slot{font-size:0.6rem;color:var(--red);cursor:pointer;}
  .filter-actions{display:flex;gap:10px;}
  .btn-apply-filter{flex:1;padding:11px;background:linear-gradient(130deg,rgba(34,211,238,0.2),rgba(79,158,248,0.2));border:1.5px solid rgba(34,211,238,0.4);border-radius:10px;color:var(--blue2);font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .btn-apply-filter:hover{background:rgba(34,211,238,0.25);transform:translateY(-1px);}
  .btn-clear-filter{padding:11px 16px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .btn-clear-filter:hover{border-color:var(--red);color:var(--red);}

  /* TRADE DETAIL MODAL (info only — no public chat) */
  .trade-detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);z-index:997;align-items:center;justify-content:center;padding:20px;}
  .trade-detail-modal.show{display:flex;}
  .trade-detail-box{background:var(--card);border:1.5px solid var(--border);border-radius:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--gp),0 32px 64px rgba(0,0,0,0.6);animation:floatin 0.3s ease;}
  .trade-detail-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1;}
  .trade-detail-head h3{font-size:1rem;font-weight:800;color:var(--purple);}
  .btn-close-modal{background:transparent;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;transition:color 0.2s;}
  .btn-close-modal:hover{color:var(--text);}
  .trade-detail-body{padding:20px;}
  .trade-detail-poster{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .trade-detail-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--purple);background:rgba(176,110,243,0.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
  .trade-detail-name{font-size:0.95rem;font-weight:800;color:var(--text);}
  .trade-detail-time{font-size:0.72rem;color:var(--muted);font-weight:600;}
  .trade-detail-sections{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .trade-detail-section h4{font-size:0.7rem;font-weight:900;letter-spacing:1.5px;margin-bottom:10px;padding:4px 10px;border-radius:20px;display:inline-block;text-transform:uppercase;}
  .trade-detail-section h4.want{color:var(--blue2);background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.25);}
  .trade-detail-section h4.offer{color:var(--green);background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);}
  .trade-detail-fruits{display:flex;flex-direction:column;gap:8px;}
  .trade-detail-fruit{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:9px 11px;}
  .trade-detail-fruit img{width:40px;height:40px;object-fit:contain;flex-shrink:0;}
  .trade-detail-fruit .tdf-name{font-size:0.82rem;font-weight:800;color:var(--text);}
  .trade-detail-fruit .tdf-val{font-size:0.68rem;color:var(--muted);margin-top:2px;}
  .trade-detail-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
  .btn-msg-trader{width:100%;padding:12px;background:linear-gradient(130deg,rgba(34,211,238,0.2),rgba(79,158,248,0.2));border:1.5px solid rgba(34,211,238,0.45);border-radius:10px;color:var(--blue2);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;}
  .btn-msg-trader:hover{background:rgba(34,211,238,0.28);transform:translateY(-2px);}
  .btn-view-inquiries{width:100%;padding:12px;background:rgba(176,110,243,0.1);border:1.5px solid rgba(176,110,243,0.4);border-radius:10px;color:var(--purple);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .btn-view-inquiries:hover{background:rgba(176,110,243,0.2);transform:translateY(-2px);}

  /* FRUIT PICKER */
  .fruit-picker-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(10px);z-index:998;align-items:center;justify-content:center;padding:20px;}
  .fruit-picker-modal.show{display:flex;}
  .fruit-picker-box{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:22px;max-width:520px;width:100%;max-height:82vh;display:flex;flex-direction:column;box-shadow:var(--gp);animation:floatin 0.3s ease;}
  .fruit-picker-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-shrink:0;}
  .fruit-picker-head h3{font-size:1rem;font-weight:800;}
  .fruit-picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:9px;overflow-y:auto;padding-right:4px;}
  .fruit-picker-item{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;transition:all 0.22s;}
  .fruit-picker-item:hover{transform:translateY(-3px) scale(1.03);}
  .fruit-picker-item img{width:52px;height:52px;object-fit:contain;margin-bottom:5px;display:block;margin-left:auto;margin-right:auto;}
  .fruit-picker-item .fp-name{font-size:0.7rem;font-weight:800;color:var(--text);}
  .fp-common{border-color:rgba(52,211,153,0.3);} .fp-common:hover{border-color:rgba(52,211,153,0.7);box-shadow:0 0 14px rgba(52,211,153,0.3);}
  .fp-rare{border-color:rgba(79,158,248,0.35);} .fp-rare:hover{border-color:rgba(79,158,248,0.75);box-shadow:0 0 14px rgba(79,158,248,0.35);}
  .fp-legendary{border-color:rgba(176,110,243,0.4);} .fp-legendary:hover{border-color:var(--purple);box-shadow:0 0 16px rgba(176,110,243,0.45);}
  .fp-mythical{border-color:rgba(251,146,60,0.4);} .fp-mythical:hover{border-color:var(--orange);box-shadow:0 0 18px rgba(251,146,60,0.45);}
  .no-fruits-msg{text-align:center;color:var(--muted);padding:40px 20px;font-size:0.9rem;font-weight:600;}

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     INBOX PAGE — private DMs
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .inbox-layout{
    display:grid;
    grid-template-columns:280px 1fr;
    height:calc(100vh - 112px);  /* below topbar+navbar */
    background:rgba(14,14,40,0.88);
    border:1.5px solid var(--border);
    border-radius:18px;
    overflow:hidden;
  }
  @media(max-width:640px){
    .inbox-layout{grid-template-columns:1fr;height:auto;min-height:70vh;}
    .inbox-sidebar{border-right:none;border-bottom:1px solid var(--border);}
    .inbox-conv{min-height:50vh;}
  }
  /* Sidebar */
  .inbox-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .inbox-sidebar-head{padding:14px 16px;font-size:0.85rem;font-weight:800;color:var(--purple);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
  .inbox-filter-tag{font-size:0.68rem;color:var(--muted);font-weight:600;}
  .inbox-conv-list{flex:1;overflow-y:auto;scrollbar-width:thin;}
  .inbox-conv-item{padding:13px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.18s;display:flex;align-items:center;gap:10px;}
  .inbox-conv-item:hover,.inbox-conv-item.active{background:rgba(176,110,243,0.08);}
  .inbox-conv-item.active{border-left:3px solid var(--purple);}
  .inbox-conv-avatar{width:36px;height:36px;border-radius:50%;background:rgba(176,110,243,0.2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
  .inbox-conv-info{flex:1;min-width:0;}
  .inbox-conv-name{font-size:0.85rem;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .inbox-conv-preview{font-size:0.72rem;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .inbox-unread-badge{background:var(--red);color:#fff;border-radius:99px;font-size:0.62rem;font-weight:900;padding:2px 7px;min-width:20px;text-align:center;flex-shrink:0;}
  .inbox-empty{padding:40px 16px;text-align:center;color:var(--muted);font-size:0.88rem;font-weight:600;line-height:1.7;}
  /* Conversation area */
  .inbox-conv{display:flex;flex-direction:column;height:100%;}
  .inbox-conv-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center;padding:24px;}
  .inbox-conv-head{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .inbox-conv-head-name{font-size:0.95rem;font-weight:800;color:var(--text);}
  .inbox-conv-head-sub{font-size:0.72rem;color:var(--muted);font-weight:600;margin-top:2px;}
  .inbox-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(176,110,243,0.35) transparent;}
  .inbox-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);flex-shrink:0;}

  /* ADMIN */
  .admin-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(251,191,36,0.15);border:1.5px solid rgba(251,191,36,0.4);border-radius:20px;padding:5px 14px;font-size:0.78rem;font-weight:800;color:var(--yellow);margin-bottom:20px;}
  .admin-form{background:rgba(14,14,40,0.92);border:1.5px solid rgba(251,191,36,0.2);border-radius:18px;padding:22px;margin-bottom:28px;}
  .admin-form h3{font-size:0.95rem;font-weight:800;color:var(--yellow);margin-bottom:16px;}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px;}
  .form-field{display:flex;flex-direction:column;gap:5px;}
  .form-label{font-size:0.75rem;font-weight:800;color:var(--muted);letter-spacing:1px;}
  .form-input{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:600;outline:none;transition:border-color 0.2s;}
  .form-input:focus{border-color:var(--yellow);}
  .form-input::placeholder{color:var(--muted);}
  .form-select{background:rgba(14,14,28,0.95);border:1.5px solid rgba(255,255,255,0.1);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:600;outline:none;cursor:pointer;}
  .form-select:focus{border-color:var(--yellow);}
  .btn-admin{padding:11px 22px;background:linear-gradient(130deg,#b45309,var(--yellow));border:none;border-radius:10px;color:#000;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
  .btn-admin:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(251,191,36,0.4);}
  .admin-fruit-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .admin-fruit-card{background:rgba(14,14,40,0.92);border:1.5px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
  .admin-fruit-card img{width:52px;height:52px;object-fit:contain;margin-bottom:8px;}
  .admin-fruit-card .fn{font-size:0.88rem;font-weight:800;color:var(--text);margin-bottom:3px;}
  .admin-fruit-card .fv{font-size:0.78rem;color:var(--muted);font-weight:600;margin-bottom:6px;}
  .btn-del-fruit{width:100%;padding:6px;background:rgba(248,113,113,0.1);border:1.5px solid rgba(248,113,113,0.3);border-radius:7px;color:var(--red);font-size:0.75rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
  .btn-del-fruit:hover{background:rgba(248,113,113,0.22);}

  /* CONTENT PAGES */
  .content-page{max-width:780px;margin:0 auto;}
  .content-page h1{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;color:var(--purple);margin-bottom:8px;}
  .content-page .page-sub{font-size:0.8rem;letter-spacing:3px;color:var(--muted);font-weight:700;margin-bottom:28px;}
  .content-section{background:rgba(14,14,40,0.85);border:1.5px solid var(--border);border-radius:16px;padding:22px 24px;margin-bottom:18px;}
  .content-section h2{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .content-section p{color:var(--muted);font-size:0.9rem;line-height:1.75;font-weight:600;margin-bottom:10px;}
  .content-section p:last-child{margin-bottom:0;}
  .content-section ul{color:var(--muted);font-size:0.9rem;line-height:1.75;font-weight:600;padding-left:18px;}
  .content-section ul li{margin-bottom:4px;}
  .contact-form{display:flex;flex-direction:column;gap:12px;}
  .contact-form input,.contact-form textarea{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.93rem;font-weight:600;outline:none;transition:border-color 0.2s;width:100%;resize:vertical;}
  .contact-form input:focus,.contact-form textarea:focus{border-color:var(--purple);}
  .contact-form input::placeholder,.contact-form textarea::placeholder{color:var(--muted);}
  .btn-contact{padding:12px 24px;background:linear-gradient(130deg,var(--purple2),var(--purple));border:none;border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.2s;align-self:flex-start;}
  .btn-contact:hover{transform:translateY(-2px);}
  .info-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .info-chip{padding:5px 12px;border-radius:20px;font-size:0.78rem;font-weight:800;background:rgba(176,110,243,0.1);border:1px solid rgba(176,110,243,0.25);color:var(--purple);}
  .footer-nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:20px 18px;border-top:1px solid var(--border);margin-top:10px;}
  .footer-nav span{font-size:0.8rem;color:var(--muted);font-weight:700;cursor:pointer;transition:color 0.2s;}

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(176,110,243,0.35);border-radius:3px;}
</style>
