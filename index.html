<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RentAFruit — Leviathan Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:           #050510;
    --purple:       #a855f7;
    --purple2:      #7c3aed;
    --blue:         #3b82f6;
    --blue2:        #06b6d4;
    --green:        #22c55e;
    --red:          #ef4444;
    --text:         #e2e8f0;
    --text-dim:     #94a3b8;
    --border:       rgba(168,85,247,0.2);
    --glow-purple:  0 0 20px rgba(168,85,247,0.5);
    --glow-blue:    0 0 20px rgba(59,130,246,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; min-height: 100vh; }

  /* INIT */
  .init-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
  }

  .spinner {
    width: 42px; height: 42px;
    border: 3px solid rgba(168,85,247,0.2);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .init-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: var(--purple);
  }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(168,85,247,0.15) 0%, transparent 65%);
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  .login-card {
    position: relative;
    background: rgba(10,10,26,0.97);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 52px 48px;
    max-width: 420px;
    width: 92%;
    text-align: center;
    box-shadow: var(--glow-purple), 0 40px 80px rgba(0,0,0,0.6);
    animation: popin 0.55s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popin {
    from { opacity:0; transform: translateY(28px) scale(0.95); }
    to   { opacity:1; transform: none; }
  }

  .logo-emoji {
    font-size: 62px;
    display: block;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 18px rgba(168,85,247,0.9));
  }

  .logo-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.9rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }

  .logo-tagline {
    font-size: 0.62rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    margin-top: 5px;
    font-weight: 600;
  }

  .login-desc {
    margin: 22px 0 30px;
    color: var(--text-dim);
    font-size: 0.98rem;
    line-height: 1.65;
  }

  .btn-google {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    width: 100%;
    padding: 14px 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.25s;
  }

  .btn-google:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.28);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .btn-google:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  .login-err {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 8px;
    color: var(--red);
    font-size: 0.84rem;
    display: none;
    text-align: left;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 24px;
    background: rgba(5,5,16,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    background: linear-gradient(90deg, var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    cursor: pointer;
    user-select: none;
  }

  .topbar-right { display: flex; align-items: center; gap: 11px; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--purple);
    object-fit: cover;
  }

  .uname {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-dim);
    display: none;
  }

  @media(min-width:480px){ .uname { display: block; } }

  .btn-sm {
    padding: 6px 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-sm:hover { border-color: var(--purple); color: var(--purple); }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 18px; }

  /* PROFILE PANEL */
  .profile-panel {
    background: rgba(168,85,247,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 34px;
  }

  .profile-inner { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }

  .profile-avatar {
    width: 50px; height: 50px;
    border-radius: 50%;
    border: 2px solid var(--purple);
    object-fit: cover;
    box-shadow: 0 0 14px rgba(168,85,247,0.4);
  }

  .profile-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--purple);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .boat-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .boat-label { font-size: 0.83rem; color: var(--text-dim); font-weight: 500; letter-spacing: 1px; }

  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 24px;
    transition: 0.3s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; bottom: 3px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .slider { background: rgba(168,85,247,0.3); border-color: var(--purple); }
  input:checked + .slider::before { transform: translateX(20px); background: var(--purple); box-shadow: 0 0 8px var(--purple); }

  .boat-status { font-size: 0.83rem; font-weight: 600; }

  /* HERO */
  .hero { text-align: center; margin-bottom: 40px; }

  .hero-eyebrow {
    font-size: 0.72rem;
    letter-spacing: 6px;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .hero-h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.6rem);
    font-weight: 900;
    line-height: 1.22;
  }

  .grad-text {
    background: linear-gradient(90deg, var(--purple), var(--blue2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 18px rgba(168,85,247,0.55));
  }

  /* DESTINATION CARDS */
  .dest-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 22px;
  }

  .dest-card {
    position: relative;
    background: rgba(10,10,26,0.85);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 28px;
    text-align: center;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: popin 0.45s ease both;
  }

  .dest-card:hover {
    border-color: var(--purple);
    transform: translateY(-6px);
    box-shadow: var(--glow-purple), 0 20px 40px rgba(0,0,0,0.4);
  }

  .dest-card:nth-child(2):hover {
    border-color: var(--blue);
    box-shadow: var(--glow-blue), 0 20px 40px rgba(0,0,0,0.4);
  }

  .dest-glow {
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(168,85,247,0.13), transparent 70%);
    pointer-events: none;
  }

  .dest-glow.blue { background: radial-gradient(circle, rgba(59,130,246,0.13), transparent 70%); }

  .dest-icon { font-size: 60px; display: block; margin-bottom: 14px; filter: drop-shadow(0 0 14px rgba(168,85,247,0.6)); }
  .dest-name { font-family: 'Orbitron', sans-serif; font-size: 1.15rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 7px; }
  .dest-desc { font-size: 0.83rem; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 18px; }
  .dest-arrow { font-size: 1.4rem; color: var(--purple); display: block; transition: transform 0.3s; }
  .dest-card:hover .dest-arrow { transform: translateX(8px); }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 26px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--purple);
    letter-spacing: 2px;
    text-shadow: 0 0 18px rgba(168,85,247,0.5);
  }

  .btn-back {
    padding: 8px 15px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-back:hover { border-color: var(--purple); color: var(--purple); }

  .btn-create {
    padding: 9px 20px;
    background: linear-gradient(135deg, var(--purple2), var(--purple));
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.93rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 0 18px rgba(168,85,247,0.4);
  }

  .btn-create:hover { transform: translateY(-2px); box-shadow: 0 0 28px rgba(168,85,247,0.65); }

  /* ROOM LIST */
  .room-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
    gap: 16px;
  }

  .room-card {
    background: rgba(10,10,26,0.92);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.28s;
    animation: popin 0.38s ease both;
  }

  .room-card:hover { border-color: var(--blue); transform: translateY(-3px); box-shadow: var(--glow-blue); }

  .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 11px; }
  .room-host { font-weight: 600; font-size: 0.93rem; }

  .timer-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.68rem;
    color: var(--blue2);
    background: rgba(6,182,212,0.1);
    border: 1px solid rgba(6,182,212,0.3);
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 1px;
  }

  .room-info { display: flex; flex-direction: column; gap: 5px; margin-bottom: 13px; }
  .p-count { font-size: 0.83rem; color: var(--text-dim); }
  .p-count.full { color: var(--red); }
  .beast-tag { font-size: 0.78rem; font-weight: 600; letter-spacing: 1px; }
  .beast-tag.yes { color: var(--green); }
  .beast-tag.no  { color: var(--red); }

  .btn-join {
    width: 100%;
    padding: 9px;
    background: linear-gradient(90deg, var(--blue2), var(--blue));
    border: none;
    border-radius: 7px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-join:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-join.full  { background: rgba(255,255,255,0.08); color: var(--text-dim); cursor: not-allowed; transform: none; }

  .empty-msg {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    border: 1px dashed var(--border);
    border-radius: 14px;
    font-size: 0.95rem;
  }

  /* ROOM LAYOUT */
  .room-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media(min-width:768px){ .room-layout { grid-template-columns: 1fr 370px; align-items: start; } }

  .room-top { margin-bottom: 14px; }

  .room-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
  }

  .glow-h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--purple);
    text-shadow: 0 0 18px rgba(168,85,247,0.7);
    letter-spacing: 2px;
  }

  .room-timer {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.88rem;
    color: var(--blue2);
    background: rgba(6,182,212,0.1);
    border: 1px solid rgba(6,182,212,0.3);
    padding: 6px 13px;
    border-radius: 8px;
    letter-spacing: 2px;
  }

  .beast-banner {
    padding: 10px 16px;
    border-radius: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 16px;
  }

  .beast-banner.yes { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.4); color: var(--green); }
  .beast-banner.no  { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.4);  color: var(--red); }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 9px;
  }

  .p-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 0.84rem;
  }

  .p-chip.me { border-color: var(--purple); background: rgba(168,85,247,0.08); }
  .p-chip.empty { border-style: dashed; color: rgba(255,255,255,0.2); font-size: 0.78rem; justify-content: center; }

  .p-name { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .p-boat { font-size: 0.95rem; flex-shrink: 0; }
  .p-boat.yes { filter: drop-shadow(0 0 5px rgba(34,197,94,0.9)); }
  .p-boat.no  { opacity: 0.35; }

  /* CHAT */
  .chat-panel {
    background: rgba(10,10,26,0.92);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    height: 490px;
  }

  .chat-head {
    padding: 13px 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--purple);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(168,85,247,0.4) transparent;
  }

  .msg { display: flex; flex-direction: column; gap: 2px; max-width: 88%; }
  .msg.me    { align-self: flex-end;   align-items: flex-end; }
  .msg.other { align-self: flex-start; align-items: flex-start; }

  .msg-who { font-size: 0.68rem; color: var(--text-dim); font-weight: 600; letter-spacing: 1px; }

  .msg-txt {
    padding: 7px 12px;
    border-radius: 10px;
    font-size: 0.88rem;
    line-height: 1.42;
    word-break: break-word;
  }

  .msg.me    .msg-txt { background: linear-gradient(135deg, var(--purple2), var(--purple)); color: #fff; }
  .msg.other .msg-txt { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08); }

  .chat-foot {
    display: flex;
    gap: 8px;
    padding: 11px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 9px 13px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.93rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--purple); }
  .chat-input::placeholder { color: var(--text-dim); }

  .btn-send {
    padding: 9px 15px;
    background: linear-gradient(135deg, var(--purple2), var(--purple));
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 11px rgba(168,85,247,0.4);
  }

  .btn-send:hover { opacity: 0.85; transform: scale(1.06); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 3px; }
</style>
</head>
<body>

<div id="app">
  <div class="init-screen">
    <div class="spinner"></div>
    <div class="init-label">INITIALIZING...</div>
  </div>
</div>

<script type="module">

  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  import { getAnalytics }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    collection,
    addDoc,
    onSnapshot,
    updateDoc,
    arrayUnion,
    arrayRemove,
    deleteDoc,
    query,
    where,
    orderBy,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  /* ── CONFIG ─────────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "AIzaSyDlBIeNVDK5nBPpVFkFSxNY59e7gW-p18c",
    authDomain:        "rentafruit-f57d9.firebaseapp.com",
    projectId:         "rentafruit-f57d9",
    storageBucket:     "rentafruit-f57d9.firebasestorage.app",
    messagingSenderId: "66702277537",
    appId:             "1:66702277537:web:e7f210f38252ad4fd0e9e0",
    measurementId:     "G-0J9TNJNEV5"
  };

  /* ── INIT ────────────────────────────────────────────────── */
  const app      = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  provider.setCustomParameters({ prompt: "select_account" });

  let currentUser        = null;
  let currentRoom        = null;
  let currentDestination = null;
  let roomsUnsub         = null;
  let chatUnsub          = null;

  /* ── AUTH ────────────────────────────────────────────────── */
  window.loginWithGoogle = async () => {
    const btn = document.getElementById("loginBtn");
    const err = document.getElementById("loginErr");
    if (btn) btn.disabled = true;
    if (err) err.style.display = "none";
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      console.error("Login error:", e.code, e.message);
      if (btn) btn.disabled = false;
      if (err) {
        err.style.display = "block";
        if (e.code === "auth/popup-blocked")
          err.textContent = "Popup blocked — please allow popups for this site and try again.";
        else if (e.code === "auth/popup-closed-by-user")
          err.textContent = "Sign-in cancelled. Please try again.";
        else if (e.code === "auth/unauthorized-domain")
          err.textContent = "Domain not authorised. Add this domain in Firebase → Authentication → Authorized Domains.";
        else
          err.textContent = "Sign-in failed (" + e.code + "). Please try again.";
      }
    }
  };

  window.logOut = async () => {
    cleanupListeners();
    await signOut(auth);
  };

  onAuthStateChanged(auth, async (user) => {
    console.log("AUTH STATE:", user ? user.displayName : "signed out");
    currentUser = user;

    if (user) {
      try {
        const uRef = doc(db, "users", user.uid);
        const snap = await getDoc(uRef);
        if (!snap.exists()) {
          await setDoc(uRef, {
            uid:          user.uid,
            name:         user.displayName,
            photo:        user.photoURL,
            hasBeastBoat: false
          });
        }
        const data     = (await getDoc(uRef)).data();
        window._myBoat = data.hasBeastBoat || false;
        renderApp("home");
      } catch (e) {
        console.error("Firestore error:", e.code, e.message);
        renderApp("home");
      }
    } else {
      renderApp("login");
    }
  });

  /* ── PROFILE ─────────────────────────────────────────────── */
  window.toggleBeastBoat = async () => {
    const uRef = doc(db, "users", currentUser.uid);
    const snap = await getDoc(uRef);
    const cur  = snap.data().hasBeastBoat || false;
    await updateDoc(uRef, { hasBeastBoat: !cur });
    window._myBoat = !cur;
    const toggle = document.getElementById("boatToggle");
    const status = document.getElementById("boatStatus");
    if (toggle) toggle.checked = !cur;
    if (status) {
      status.textContent = !cur ? "Yes — Beast Hunter" : "No Beast Hunter";
      status.style.color = !cur ? "var(--green)" : "var(--red)";
    }
  };

  /* ── NAVIGATION ──────────────────────────────────────────── */
  window.goHome = () => {
    cleanupListeners();
    currentRoom = null;
    currentDestination = null;
    renderApp("home");
  };

  window.goDestination = (dest) => {
    cleanupListeners();
    currentDestination = dest;
    renderApp("destination");
    loadRooms(dest);
  };

  function cleanupListeners() {
    if (roomsUnsub) { roomsUnsub(); roomsUnsub = null; }
    if (chatUnsub)  { chatUnsub();  chatUnsub  = null; }
  }

  /* ── ROOMS ───────────────────────────────────────────────── */
  window.createRoom = async () => {
    if (!currentUser || !currentDestination) return;
    const now = Date.now();
    const ref = await addDoc(collection(db, "rooms"), {
      destination: currentDestination,
      host:        currentUser.displayName,
      hostUid:     currentUser.uid,
      players: [{
        uid:          currentUser.uid,
        name:         currentUser.displayName,
        hasBeastBoat: window._myBoat
      }],
      createdAt: now,
      expiresAt: now + 3600000
    });
    enterRoom(ref.id);
  };

  function loadRooms(dest) {
    const q = query(collection(db, "rooms"), where("destination", "==", dest));
    roomsUnsub = onSnapshot(q, (snap) => {
      const now   = Date.now();
      const rooms = [];
      snap.forEach((d) => {
        const r = { id: d.id, ...d.data() };
        if (r.expiresAt < now) { deleteDoc(doc(db, "rooms", d.id)); return; }
        rooms.push(r);
      });
      renderRoomList(rooms);
    });
  }

  function renderRoomList(rooms) {
    const el = document.getElementById("roomList");
    if (!el) return;
    if (rooms.length === 0) {
      el.innerHTML = `<div class="empty-msg">No active rooms — be the first to create one!</div>`;
      return;
    }
    el.innerHTML = rooms.map((r) => {
      const hasBeast  = r.players.some((p) => p.hasBeastBoat);
      const full      = r.players.length >= 7;
      const remaining = Math.max(0, r.expiresAt - Date.now());
      const mins      = Math.floor(remaining / 60000);
      const secs      = Math.floor((remaining % 60000) / 1000);
      return `
        <div class="room-card" onclick="enterRoom('${r.id}')">
          <div class="room-header">
            <span class="room-host">👑 ${r.host}</span>
            <span class="timer-badge">⏱ ${mins}m ${secs}s</span>
          </div>
          <div class="room-info">
            <span class="p-count ${full ? "full" : ""}">👥 ${r.players.length} / 7</span>
            <span class="beast-tag ${hasBeast ? "yes" : "no"}">
              ${hasBeast ? "🚢 Beast Hunter Available" : "❌ No Beast Hunter"}
            </span>
          </div>
          <button class="btn-join ${full ? "full" : ""}"
            onclick="event.stopPropagation(); joinRoom('${r.id}')">
            ${full ? "FULL" : "JOIN ROOM"}
          </button>
        </div>`;
    }).join("");
  }

  window.joinRoom = async (roomId) => {
    const rRef = doc(db, "rooms", roomId);
    const snap = await getDoc(rRef);
    if (!snap.exists()) return;
    const r = snap.data();
    if (r.players.length >= 7) { alert("Room is full!"); return; }
    if (r.players.find((p) => p.uid === currentUser.uid)) { enterRoom(roomId); return; }
    await updateDoc(rRef, {
      players: arrayUnion({
        uid: currentUser.uid, name: currentUser.displayName, hasBeastBoat: window._myBoat
      })
    });
    enterRoom(roomId);
  };

  window.leaveRoom = async () => {
    if (!currentRoom) return;
    const rRef = doc(db, "rooms", currentRoom);
    const snap = await getDoc(rRef);
    if (!snap.exists()) { goDestination(currentDestination); return; }
    const r  = snap.data();
    const me = r.players.find((p) => p.uid === currentUser.uid);
    if (me) await updateDoc(rRef, { players: arrayRemove(me) });
    const updated = await getDoc(rRef);
    if (updated.exists() && updated.data().players.length === 0) await deleteDoc(rRef);
    cleanupListeners();
    currentRoom = null;
    renderApp("destination");
    loadRooms(currentDestination);
  };

  window.enterRoom = (roomId) => {
    cleanupListeners();
    currentRoom = roomId;
    renderApp("room");
    listenRoom(roomId);
    listenChat(roomId);
  };

  function listenRoom(roomId) {
    roomsUnsub = onSnapshot(doc(db, "rooms", roomId), (snap) => {
      if (!snap.exists()) { goDestination(currentDestination); return; }
      const r = { id: snap.id, ...snap.data() };
      if (r.expiresAt < Date.now()) { deleteDoc(doc(db, "rooms", roomId)); goDestination(currentDestination); return; }
      renderRoomView(r);
    });
  }

  function renderRoomView(r) {
    const hasBeast  = r.players.some((p) => p.hasBeastBoat);
    const remaining = Math.max(0, r.expiresAt - Date.now());
    const mins      = Math.floor(remaining / 60000);
    const secs      = Math.floor((remaining % 60000) / 1000);
    const el        = document.getElementById("roomContent");
    if (!el) return;
    el.innerHTML = `
      <div class="room-title-row">
        <h2 class="glow-h2">${r.destination}</h2>
        <span class="room-timer">⏱ ${mins}:${String(secs).padStart(2,"0")}</span>
      </div>
      <div class="beast-banner ${hasBeast ? "yes" : "no"}">
        ${hasBeast ? "🚢 BEAST HUNTER AVAILABLE" : "❌ NO BEAST HUNTER IN ROOM"}
      </div>
      <div class="player-grid">
        ${r.players.map((p) => `
          <div class="p-chip ${p.uid === currentUser?.uid ? "me" : ""}">
            <span class="p-name">${p.name}</span>
            <span class="p-boat ${p.hasBeastBoat ? "yes" : "no"}">${p.hasBeastBoat ? "🚢" : "🚫"}</span>
          </div>`).join("")}
        ${Array(Math.max(0, 7 - r.players.length)).fill(0).map(() =>
          `<div class="p-chip empty">Empty Slot</div>`).join("")}
      </div>`;
  }

  /* ── CHAT ────────────────────────────────────────────────── */
  function listenChat(roomId) {
    const q = query(collection(db, "rooms", roomId, "chat"), orderBy("ts", "asc"));
    chatUnsub = onSnapshot(q, (snap) => {
      const box = document.getElementById("chatBox");
      if (!box) return;
      box.innerHTML = snap.docs.map((d) => {
        const m    = d.data();
        const isMe = m.uid === currentUser?.uid;
        return `
          <div class="msg ${isMe ? "me" : "other"}">
            <span class="msg-who">${m.name}</span>
            <span class="msg-txt">${esc(m.text)}</span>
          </div>`;
      }).join("");
      box.scrollTop = box.scrollHeight;
    });
  }

  window.sendMessage = async () => {
    const input = document.getElementById("chatInput");
    const text  = input?.value.trim();
    if (!text || !currentRoom) return;
    input.value = "";
    await addDoc(collection(db, "rooms", currentRoom, "chat"), {
      uid:  currentUser.uid,
      name: currentUser.displayName,
      text: text,
      ts:   serverTimestamp()
    });
  };

  window.onChatKey = (e) => { if (e.key === "Enter") window.sendMessage(); };

  function esc(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  /* ── RENDERER ────────────────────────────────────────────── */
  function renderApp(view) {
    const root = document.getElementById("app");

    if (view === "login") {
      root.innerHTML = `
        <div class="login-screen">
          <div class="login-bg"></div>
          <div class="login-card">
            <span class="logo-emoji">🍊</span>
            <div class="logo-name">RentAFruit</div>
            <div class="logo-tagline">LEVIATHAN HUNT MATCHMAKER</div>
            <p class="login-desc">Join forces. Hunt the beast. Dominate the seas.</p>
            <button class="btn-google" id="loginBtn" onclick="loginWithGoogle()">
              <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.3 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.4l7.8 6C12.3 13.2 17.7 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.1 24.6c0-1.5-.1-3-.4-4.4H24v8.3h12.4c-.5 2.7-2.1 5-4.4 6.5l6.9 5.4c4-3.7 6.2-9.2 6.2-15.8z"/>
                <path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.6l7.8-6z"/>
                <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-6.9-5.4c-2.1 1.4-4.8 2.3-8.3 2.3-6.3 0-11.7-3.7-13.5-9.1l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
              </svg>
              Sign in with Google
            </button>
            <div class="login-err" id="loginErr"></div>
          </div>
        </div>`;
      return;
    }

    const header = `
      <header class="topbar">
        <span class="topbar-logo" onclick="goHome()">🍊 RentAFruit</span>
        <div class="topbar-right">
          <img src="${currentUser?.photoURL}" class="avatar" alt="" />
          <span class="uname">${currentUser?.displayName}</span>
          <button class="btn-sm" onclick="logOut()">Logout</button>
        </div>
      </header>`;

    if (view === "home") {
      root.innerHTML = header + `
        <main class="main">
          <div class="profile-panel">
            <div class="profile-inner">
              <img src="${currentUser?.photoURL}" class="profile-avatar" alt="" />
              <div>
                <div class="profile-name">${currentUser?.displayName}</div>
                <div class="boat-row">
                  <span class="boat-label">Beast Hunter Boat</span>
                  <label class="switch">
                    <input type="checkbox" id="boatToggle"
                      ${window._myBoat ? "checked" : ""}
                      onchange="toggleBeastBoat()" />
                    <span class="slider"></span>
                  </label>
                  <span id="boatStatus" class="boat-status"
                    style="color:${window._myBoat ? "var(--green)" : "var(--red)"}">
                    ${window._myBoat ? "Yes — Beast Hunter" : "No Beast Hunter"}
                  </span>
                </div>
              </div>
            </div>
          </div>

          <div class="hero">
            <div class="hero-eyebrow">SELECT YOUR</div>
            <h1 class="hero-h1">Destination of<br/><span class="grad-text">Leviathan Heart</span></h1>
          </div>

          <div class="dest-grid">
            <div class="dest-card" onclick="goDestination('Tiki Outpost')">
              <div class="dest-glow"></div>
              <span class="dest-icon">🏝️</span>
              <div class="dest-name">Tiki Outpost</div>
              <div class="dest-desc">Tropical hunting grounds</div>
              <span class="dest-arrow">→</span>
            </div>
            <div class="dest-card" onclick="goDestination('Hydra Island')">
              <div class="dest-glow blue"></div>
              <span class="dest-icon">🐉</span>
              <div class="dest-name">Hydra Island</div>
              <div class="dest-desc">Dragon-infested waters</div>
              <span class="dest-arrow">→</span>
            </div>
          </div>
        </main>`;
      return;
    }

    if (view === "destination") {
      root.innerHTML = header + `
        <main class="main">
          <div class="page-header">
            <button class="btn-back" onclick="goHome()">← Back</button>
            <h2 class="page-title">${currentDestination}</h2>
            <button class="btn-create" onclick="createRoom()">+ Create Room</button>
          </div>
          <div id="roomList" class="room-list">
            <div class="empty-msg" style="border:none;">Loading rooms...</div>
          </div>
        </main>`;
      return;
    }

    if (view === "room") {
      root.innerHTML = header + `
        <main class="main room-layout">
          <div>
            <div class="room-top">
              <button class="btn-back" onclick="leaveRoom()">← Leave Room</button>
            </div>
            <div id="roomContent"></div>
          </div>
          <div class="chat-panel">
            <div class="chat-head">💬 Room Chat</div>
            <div class="chat-body" id="chatBox"></div>
            <div class="chat-foot">
              <input id="chatInput" class="chat-input"
                placeholder="Type a message..."
                onkeypress="onChatKey(event)" />
              <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
          </div>
        </main>`;
      return;
    }
  }

</script>
</body>
</html>
